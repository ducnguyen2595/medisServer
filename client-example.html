<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Medis Player - Audiophile Streaming</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }

        h1 {
            color: #667eea;
            margin-bottom: 10px;
            font-size: 2.5em;
        }

        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 1.1em;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 15px;
            text-align: center;
        }

        .stat-value {
            font-size: 2em;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .stat-label {
            opacity: 0.9;
            font-size: 0.9em;
        }

        .search-box {
            margin-bottom: 30px;
        }

        input[type="text"] {
            width: 100%;
            padding: 15px;
            font-size: 1em;
            border: 2px solid #667eea;
            border-radius: 10px;
            outline: none;
            transition: all 0.3s;
        }

        input[type="text"]:focus {
            border-color: #764ba2;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .media-list {
            display: grid;
            gap: 15px;
        }

        .media-item {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.3s;
            cursor: pointer;
        }

        .media-item:hover {
            background: #e9ecef;
            transform: translateX(5px);
        }

        .media-info {
            flex: 1;
        }

        .media-title {
            font-weight: bold;
            font-size: 1.1em;
            color: #333;
            margin-bottom: 5px;
        }

        .media-meta {
            color: #666;
            font-size: 0.9em;
        }

        .badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.8em;
            font-weight: bold;
            margin-right: 5px;
        }

        .badge-flac {
            background: #28a745;
            color: white;
        }

        .badge-dsf {
            background: #ffc107;
            color: #333;
        }

        .badge-mp3 {
            background: #17a2b8;
            color: white;
        }

        .badge-mp4 {
            background: #dc3545;
            color: white;
        }

        .play-button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 25px;
            font-size: 1em;
            cursor: pointer;
            transition: all 0.3s;
        }

        .play-button:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .player {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: #333;
            color: white;
            padding: 20px;
            display: none;
            align-items: center;
            gap: 20px;
            box-shadow: 0 -5px 20px rgba(0,0,0,0.3);
        }

        .player.active {
            display: flex;
        }

        .player-info {
            flex: 1;
        }

        .now-playing {
            font-size: 0.9em;
            opacity: 0.7;
            margin-bottom: 5px;
        }

        .player-title {
            font-weight: bold;
            font-size: 1.1em;
        }

        audio {
            width: 300px;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #667eea;
            font-size: 1.2em;
        }

        .error {
            background: #f8d7da;
            color: #721c24;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎵 Medis Player</h1>
        <p class="subtitle">Audiophile-grade streaming from your personal library</p>

        <div class="stats" id="stats">
            <div class="loading">Loading library stats...</div>
        </div>

        <div class="search-box">
            <input type="text" id="search" placeholder="🔍 Search your library..." />
        </div>

        <div class="media-list" id="mediaList">
            <div class="loading">Loading media files...</div>
        </div>
    </div>

    <div class="player" id="player">
        <div class="player-info">
            <div class="now-playing">NOW PLAYING</div>
            <div class="player-title" id="playerTitle">-</div>
        </div>
        <audio id="audioPlayer" controls></audio>
    </div>

    <script>
        // Auto-detect server URL (works when served from the server)
        const SERVER_URL = window.location.origin;
        const API_BASE = `${SERVER_URL}/api`;

        let allMedia = [];

        // Load library stats
        async function loadStats() {
            try {
                const response = await fetch(`${API_BASE}/stats`);
                const stats = await response.json();

                const statsHtml = `
                    <div class="stat-card">
                        <div class="stat-value">${stats.audio_files}</div>
                        <div class="stat-label">Audio Files</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value">${stats.video_files}</div>
                        <div class="stat-label">Video Files</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value">${(stats.total_size_bytes / 1024 / 1024 / 1024).toFixed(1)} GB</div>
                        <div class="stat-label">Total Size</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value">${(stats.total_duration_seconds / 3600).toFixed(0)} hrs</div>
                        <div class="stat-label">Total Duration</div>
                    </div>
                `;

                document.getElementById('stats').innerHTML = statsHtml;
            } catch (error) {
                document.getElementById('stats').innerHTML = '<div class="error">Failed to load stats</div>';
            }
        }

        // Load media files
        async function loadMedia(type = 'audio', searchQuery = '') {
            try {
                let url = `${API_BASE}/media?type=${type}&limit=500`;
                if (searchQuery) {
                    url += `&search=${encodeURIComponent(searchQuery)}`;
                }
                const response = await fetch(url);
                const { data } = await response.json();
                allMedia = data;
                displayMedia(data);
            } catch (error) {
                document.getElementById('mediaList').innerHTML = '<div class="error">Failed to load media files</div>';
            }
        }

        // Display media files
        function displayMedia(media) {
            if (media.length === 0) {
                document.getElementById('mediaList').innerHTML = '<div class="loading">No media files found</div>';
                return;
            }

            const html = media.map(item => {
                const codec = item.codec || 'Unknown';
                const badgeClass = codec.toLowerCase().includes('flac') ? 'badge-flac' : 
                                   codec.toLowerCase().includes('dsf') ? 'badge-dsf' :
                                   codec.toLowerCase().includes('mp3') ? 'badge-mp3' : 'badge-mp4';

                const artist = item.artist || 'Unknown Artist';
                const title = item.title || item.file_name;
                const album = item.album ? ` • ${item.album}` : '';
                const duration = item.duration ? ` • ${Math.floor(item.duration / 60)}:${String(Math.floor(item.duration % 60)).padStart(2, '0')}` : '';
                const bitrate = item.sample_rate ? ` • ${(item.sample_rate / 1000).toFixed(1)}kHz` : '';

                return `
                    <div class="media-item" onclick="playMedia(${item.id}, '${title.replace(/'/g, "\\'")}', '${artist.replace(/'/g, "\\'")}')">
                        <div class="media-info">
                            <div class="media-title">${title}</div>
                            <div class="media-meta">
                                <span class="badge ${badgeClass}">${codec}</span>
                                ${artist}${album}${duration}${bitrate}
                            </div>
                        </div>
                        <button class="play-button" onclick="event.stopPropagation(); playMedia(${item.id}, '${title.replace(/'/g, "\\'")}', '${artist.replace(/'/g, "\\'")}')">▶ Play</button>
                    </div>
                `;
            }).join('');

            document.getElementById('mediaList').innerHTML = html;
        }

        // Play media
        function playMedia(id, title, artist) {
            const player = document.getElementById('player');
            const audioPlayer = document.getElementById('audioPlayer');
            const playerTitle = document.getElementById('playerTitle');

            // Use direct streaming for best quality
            audioPlayer.src = `${API_BASE}/stream/${id}`;
            playerTitle.textContent = `${title} - ${artist}`;

            player.classList.add('active');
            audioPlayer.play();
        }

        // Search functionality with server-side search
        let searchTimeout;
        document.getElementById('search').addEventListener('input', (e) => {
            const query = e.target.value.trim();
            
            // Clear previous timeout
            clearTimeout(searchTimeout);
            
            if (query === '') {
                loadMedia('audio');
                return;
            }

            // Debounce search - wait 300ms after user stops typing
            searchTimeout = setTimeout(() => {
                loadMedia('audio', query);
            }, 300);
        });

        // Initialize
        loadStats();
        loadMedia('audio');
    </script>
</body>
</html>
