<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Medis Hi-Fi</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@400;500;600;700&family=Geist:wght@400;500;600;700&family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --bg: #0c0a08;
            --surface: #161310;
            --surface-elev: #1f1b16;
            --accent: #d4a574;
            --accent-rust: #a0522d;
            --text: #f5efe6;
            --text-dim: #a39a8e;
            --text-subdued: #5a5249;
        }

        html, body {
            height: 100%;
            width: 100%;
        }

        body {
            font-family: 'Geist', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--bg);
            color: var(--text);
            overflow-x: hidden;
            padding-bottom: 90px;
            background-image: url("data:image/svg+xml,%3Csvg width='100' height='100' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' seed='1'/%3E%3CfeColorMatrix type='saturate' values='0.3'/%3E%3C/filter%3E%3Crect width='100' height='100' fill='%230c0a08' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
        }

        /* Header with wordmark */
        .header {
            background: var(--surface-elev);
            padding: 16px;
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid var(--text-subdued);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header h1 {
            font-family: 'Fraunces', serif;
            font-size: 1.3em;
            font-weight: 600;
            letter-spacing: 0.05em;
        }

        .header-meta {
            display: flex;
            align-items: center;
            gap: 12px;
            font-family: 'Geist Mono', monospace;
            font-size: 0.75em;
            color: var(--text-dim);
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--accent);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        /* Tabs as channel selector */
        .tabs {
            display: flex;
            background: var(--surface-elev);
            position: sticky;
            top: 60px;
            z-index: 99;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: none;
            border-bottom: 1px solid var(--text-subdued);
            gap: 2px;
        }

        .tabs::-webkit-scrollbar { display: none; }

        .tab {
            padding: 12px 16px;
            background: transparent;
            border: none;
            color: var(--text-dim);
            font-family: 'Geist Mono', monospace;
            font-size: 0.8em;
            font-weight: 600;
            letter-spacing: 0.05em;
            cursor: pointer;
            white-space: nowrap;
            position: relative;
            transition: color 0.2s ease;
        }

        .tab:hover {
            color: var(--text);
        }

        .tab.active {
            color: var(--accent);
        }

        .tab.active::after {
            content: '';
            position: absolute;
            bottom: 8px;
            left: 50%;
            transform: translateX(-50%);
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--accent);
        }

        /* Search bar */
        .search {
            padding: 16px;
            background: var(--surface);
            position: sticky;
            top: 120px;
            z-index: 98;
            border-bottom: 1px solid var(--text-subdued);
        }

        .search-container {
            position: relative;
        }

        .search-icon {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 1.2em;
        }

        input[type="text"] {
            width: 100%;
            padding: 12px 14px 12px 48px;
            background: var(--bg);
            border: 1px solid var(--text-subdued);
            border-radius: 3px;
            color: var(--text);
            font-family: 'Geist Mono', monospace;
            font-size: 0.9em;
            transition: all 0.2s;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: var(--accent);
            background: var(--surface);
        }

        input[type="text"]::placeholder {
            color: var(--text-subdued);
        }

        /* Content area */
        .content {
            padding: 0 16px 16px;
            min-height: calc(100vh - 300px);
        }

        /* Section headers */
        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 32px 0 16px;
            padding-bottom: 12px;
            border-bottom: 1px solid var(--text-subdued);
        }

        .section-title {
            font-family: 'Fraunces', serif;
            font-size: 1.3em;
            font-weight: 600;
        }

        .section-subtitle {
            font-family: 'Geist Mono', monospace;
            font-size: 0.75em;
            color: var(--text-dim);
            letter-spacing: 0.05em;
        }

        /* Playback controls bar */
        .playback-bar {
            padding: 12px 16px;
            background: var(--surface);
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--text-subdued);
            gap: 12px;
        }

        .control-btn {
            background: transparent;
            border: none;
            color: var(--text-dim);
            cursor: pointer;
            padding: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: color 0.2s ease;
            width: 32px;
            height: 32px;
        }

        .control-btn:hover {
            color: var(--text);
        }

        .control-btn.active {
            color: var(--accent);
        }

        .control-btn svg {
            width: 20px;
            height: 20px;
            stroke: currentColor;
            fill: none;
            stroke-width: 2;
        }

        .playback-info {
            flex: 1;
            font-family: 'Geist Mono', monospace;
            font-size: 0.8em;
            color: var(--text-dim);
            text-align: center;
        }

        /* Track items */
        .track-item, .video-item {
            padding: 12px;
            margin-bottom: 8px;
            background: var(--surface);
            border-radius: 3px;
            border: 1px solid transparent;
            cursor: pointer;
            transition: all 0.2s;
            display: grid;
            grid-template-columns: 60px 1fr;
            gap: 12px;
            align-items: start;
        }

        .track-item:hover, .video-item:hover {
            background: var(--surface-elev);
            border-color: var(--text-subdued);
        }

        .track-item.playing {
            border-color: var(--accent);
        }

        .artwork {
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, var(--accent-rust), var(--accent));
            border-radius: 3px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5em;
            flex-shrink: 0;
        }

        .artwork img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 3px;
        }

        .track-info {
            display: flex;
            flex-direction: column;
            gap: 4px;
            min-width: 0;
        }

        .track-title {
            font-family: 'Fraunces', serif;
            font-size: 0.95em;
            font-weight: 600;
            color: var(--text);
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .track-meta {
            font-family: 'Geist Mono', monospace;
            font-size: 0.7em;
            color: var(--text-dim);
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .spec-strip {
            font-family: 'Geist Mono', monospace;
            font-size: 0.65em;
            color: var(--text-subdued);
            margin-top: 2px;
            letter-spacing: 0.05em;
        }

        /* Mini player */
        .mini-player {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--surface-elev);
            border-top: 1px solid var(--text-subdued);
            z-index: 200;
            display: none;
        }

        .mini-player.active {
            display: flex;
            flex-direction: column;
        }

        .mini-progress {
            height: 2px;
            background: var(--text-subdued);
            width: 100%;
        }

        .mini-progress-fill {
            height: 100%;
            background: var(--accent);
            width: 0%;
            transition: width 0.1s linear;
        }

        .mini-player-content {
            padding: 12px 16px;
            display: grid;
            grid-template-columns: 48px 1fr 90px;
            gap: 12px;
            align-items: center;
            cursor: pointer;
        }

        .mini-artwork {
            width: 48px;
            height: 48px;
            background: linear-gradient(135deg, var(--accent-rust), var(--accent));
            border-radius: 2px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2em;
            flex-shrink: 0;
        }

        .mini-artwork img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 2px;
        }

        .mini-info {
            min-width: 0;
        }

        .mini-title {
            font-family: 'Fraunces', serif;
            font-size: 0.9em;
            font-weight: 600;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .mini-artist {
            font-family: 'Geist Mono', monospace;
            font-size: 0.7em;
            color: var(--text-dim);
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .mini-controls {
            display: flex;
            gap: 8px;
            justify-content: flex-end;
        }

        .mini-controls .control-btn {
            width: 28px;
            height: 28px;
        }

        .mini-controls .control-btn svg {
            width: 16px;
            height: 16px;
        }

        /* Full player */
        .full-player {
            position: fixed;
            inset: 0;
            background: var(--bg);
            z-index: 500;
            display: none;
            flex-direction: column;
            overflow: hidden;
        }

        .full-player.active {
            display: flex;
        }

        .full-player-bg {
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, var(--accent-rust), var(--accent));
            opacity: 0.1;
            pointer-events: none;
        }

        .full-player-content {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            height: 100%;
            overflow-y: auto;
        }

        .full-player-header {
            padding: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--text-subdued);
        }

        .full-player-body {
            flex: 1;
            padding: 32px 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 32px;
            overflow-y: auto;
        }

        .full-artwork {
            width: 240px;
            height: 240px;
            background: linear-gradient(135deg, var(--accent-rust), var(--accent));
            border-radius: 3px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 4em;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
        }

        .full-artwork img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 3px;
        }

        .full-track-info {
            text-align: center;
            width: 100%;
            max-width: 300px;
        }

        .full-track-title {
            font-family: 'Fraunces', serif;
            font-size: 1.8em;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .full-track-artist {
            font-family: 'Geist Mono', monospace;
            font-size: 0.9em;
            color: var(--text-dim);
            margin-bottom: 12px;
        }

        .full-track-spec {
            font-family: 'Geist Mono', monospace;
            font-size: 0.75em;
            color: var(--text-subdued);
            letter-spacing: 0.05em;
        }

        .full-progress {
            width: 100%;
            max-width: 300px;
            padding: 0 16px;
        }

        .progress-bar {
            height: 2px;
            background: var(--text-subdued);
            border-radius: 1px;
            cursor: pointer;
            position: relative;
            margin-bottom: 8px;
        }

        .progress-fill {
            height: 100%;
            background: var(--accent);
            border-radius: 1px;
            width: 0%;
            transition: width 0.1s linear;
        }

        .progress-time {
            display: flex;
            justify-content: space-between;
            font-family: 'Geist Mono', monospace;
            font-size: 0.7em;
            color: var(--text-dim);
        }

        .full-controls {
            display: flex;
            gap: 16px;
            justify-content: center;
            width: 100%;
        }

        .full-controls .control-btn {
            width: 40px;
            height: 40px;
        }

        .full-controls .control-btn svg {
            width: 24px;
            height: 24px;
        }

        .full-controls .control-btn.play-pause {
            width: 56px;
            height: 56px;
        }

        .full-controls .control-btn.play-pause svg {
            width: 32px;
            height: 32px;
        }

        /* Queue panel */
        .queue-panel {
            position: fixed;
            right: 0;
            top: 0;
            bottom: 0;
            width: 100%;
            max-width: 400px;
            background: var(--surface);
            z-index: 600;
            transform: translateX(100%);
            transition: transform 0.3s ease;
            display: flex;
            flex-direction: column;
            border-left: 1px solid var(--text-subdued);
        }

        .queue-panel.active {
            transform: translateX(0);
        }

        .queue-header {
            padding: 16px;
            border-bottom: 1px solid var(--text-subdued);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .queue-list {
            flex: 1;
            overflow-y: auto;
        }

        .queue-item {
            padding: 12px 16px;
            border-bottom: 1px solid var(--text-subdued);
            font-size: 0.9em;
            cursor: pointer;
            transition: background 0.2s;
        }

        .queue-item:hover {
            background: var(--surface-elev);
        }

        .queue-item.current {
            background: var(--surface-elev);
            border-left: 2px solid var(--accent);
            padding-left: 14px;
        }

        /* Lyrics panel */
        .lyrics-panel {
            position: fixed;
            bottom: 90px;
            left: 0;
            right: 0;
            max-height: 60vh;
            background: var(--surface-elev);
            z-index: 400;
            transform: translateY(100%);
            transition: transform 0.3s ease;
            border-top: 1px solid var(--text-subdued);
            display: flex;
            flex-direction: column;
        }

        .lyrics-panel.active {
            transform: translateY(0);
        }

        .lyrics-header {
            padding: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--text-subdued);
        }

        .lyrics-content {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
        }

        .lyric-line {
            padding: 8px 0;
            font-family: 'Geist Mono', monospace;
            font-size: 0.85em;
            color: var(--text-dim);
            transition: all 0.1s;
        }

        .lyric-line.active {
            color: var(--accent);
            font-family: 'Fraunces', serif;
            font-size: 1em;
        }

        /* Lyrics size variants */
        #lyricsContent.size-small .lyric-line {
            font-size: 0.7em;
        }

        #lyricsContent.size-small .lyric-line.active {
            font-size: 0.85em;
        }

        #lyricsContent.size-large .lyric-line {
            font-size: 1.1em;
        }

        #lyricsContent.size-large .lyric-line.active {
            font-size: 1.3em;
        }

        /* Video player */
        .video-player {
            position: fixed;
            inset: 0;
            background: var(--bg);
            z-index: 500;
            display: none;
            flex-direction: column;
        }

        .video-player.active {
            display: flex;
        }

        .video-header {
            padding: 16px;
            display: flex;
            gap: 12px;
            align-items: center;
            background: var(--surface-elev);
            border-bottom: 1px solid var(--text-subdued);
        }

        .video-header h3 {
            font-family: 'Fraunces', serif;
            font-size: 1.1em;
            flex: 1;
            min-width: 0;
        }

        video {
            width: 100%;
            flex: 1;
            background: #000;
        }

        /* Toast notifications */
        .toast {
            position: fixed;
            bottom: 110px;
            left: 16px;
            right: 16px;
            background: var(--surface-elev);
            padding: 12px 16px;
            border-radius: 3px;
            border: 1px solid var(--text-subdued);
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.3s ease;
            pointer-events: none;
            z-index: 350;
            font-family: 'Geist Mono', monospace;
            font-size: 0.85em;
        }

        .toast.active {
            opacity: 1;
            transform: translateY(0);
            pointer-events: auto;
        }

        /* Loading spinner */
        .loading {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 200px;
            gap: 16px;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 2px solid var(--text-subdued);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Sources tab specific */
        .source-section {
            margin: 24px 0;
            padding: 16px;
            background: var(--surface);
            border: 1px solid var(--text-subdued);
            border-radius: 3px;
        }

        .source-section h3 {
            font-family: 'Fraunces', serif;
            font-size: 1.1em;
            margin-bottom: 12px;
        }

        .scan-button {
            width: 100%;
            padding: 12px 16px;
            background: var(--accent);
            color: var(--bg);
            border: none;
            border-radius: 3px;
            font-family: 'Geist Mono', monospace;
            font-size: 0.85em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            margin-bottom: 12px;
        }

        .scan-button:hover {
            opacity: 0.9;
        }

        .scan-button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .input-group {
            display: flex;
            gap: 8px;
            margin-bottom: 12px;
        }

        .input-group input {
            flex: 1;
        }

        .input-group button {
            padding: 12px 16px;
        }

        .stats-card {
            padding: 12px 16px;
            background: var(--bg);
            border: 1px solid var(--text-subdued);
            border-radius: 3px;
            margin-bottom: 8px;
        }

        .stats-label {
            font-family: 'Geist Mono', monospace;
            font-size: 0.7em;
            color: var(--text-subdued);
            letter-spacing: 0.05em;
        }

        .stats-value {
            font-family: 'Fraunces', serif;
            font-size: 1.4em;
            font-weight: 600;
            color: var(--accent);
            margin-top: 4px;
        }

        /* Bubbles tab styles (preserved with new palette) */
        #bubbles {
            position: relative;
        }

        .bubble-svg {
            width: 100%;
            height: calc(100vh - 300px);
        }

        .bubbles-empty {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 300px;
            color: var(--text-dim);
            font-family: 'Geist Mono', monospace;
            font-size: 0.9em;
        }

        .breadcrumbs {
            padding: 12px 16px;
            background: var(--surface);
            border-bottom: 1px solid var(--text-subdued);
            font-family: 'Geist Mono', monospace;
            font-size: 0.8em;
            color: var(--text-dim);
        }

        #bubblesCrumbs {
            display: flex;
            gap: 8px;
        }

        .breadcrumb-item {
            cursor: pointer;
            padding: 2px 6px;
            border-radius: 2px;
            transition: all 0.2s;
        }

        .breadcrumb-item:hover {
            background: var(--surface-elev);
            color: var(--accent);
        }

        .breadcrumb-separator {
            color: var(--text-subdued);
        }

        .bubble-focus-chip {
            position: absolute;
            top: 16px;
            right: 16px;
            background: var(--surface-elev);
            padding: 8px 12px;
            border-radius: 3px;
            border: 1px solid var(--accent);
            font-family: 'Geist Mono', monospace;
            font-size: 0.8em;
            max-width: calc(100% - 32px);
            overflow: hidden;
            text-overflow: ellipsis;
            opacity: 0;
            transition: opacity 0.18s ease;
            pointer-events: none;
            z-index: 3;
        }

        .bubble-focus-chip[data-visible="true"] {
            opacity: 1;
        }

        .chip-meta {
            color: var(--text-dim);
            font-weight: 400;
            margin-left: 6px;
        }

        /* Graph tab styles */
        #graph {
            position: relative;
        }

        .graph-container {
            width: 100%;
            height: calc(100vh - 300px);
            position: relative;
        }

        #graphSvg {
            width: 100%;
            height: 100%;
        }

        .graph-node {
            cursor: pointer;
            transition: r 0.2s;
        }

        .graph-link {
            stroke: var(--text-subdued);
            opacity: 0.15;
            pointer-events: none;
        }

        .graph-link.active {
            stroke: var(--accent);
            opacity: 0.5;
            stroke-width: 2;
        }

        .graph-label {
            font-family: 'Geist Mono', monospace;
            font-size: 0.7em;
            fill: var(--text);
            pointer-events: none;
            text-anchor: middle;
            dominant-baseline: middle;
        }

        .graph-label.dim {
            fill: var(--text-subdued);
            opacity: 0.3;
        }
    </style>
</head>
<body>
    <!-- Header -->
    <div class="header">
        <div>
            <h1>MEDIS</h1>

    <!-- Lyrics Panel -->

    <!-- Video Player -->
    <div class="video-player" id="videoPlayer">
        <div class="video-header">
            <button class="control-btn" onclick="closeVideoPlayer()">
                <svg viewBox="0 0 24 24">
                    <line x1="19" y1="5" x2="5" y2="19" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>

                </svg>
            </button>
            <h3 id="videoTitle" style="flex: 1;">Video</h3>
            <span style="font-family: 'Geist Mono', monospace; font-size: 0.8em; color: var(--text-dim);" id="videoMeta">-</span>

        <video id="videoElement" controls playsinline style="width: 100%; flex: 1; background: #000;"></video>

    <!-- Toast Notification -->
    <div class="toast" id="toast"></div>

    <!-- Hidden audio player -->
    <audio id="audioPlayer" style="display: none;"></audio>

    <script src="https://d3js.org/d3.v7.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script>
        const API_BASE = '/api';

        // Global state
        let currentTab = 'home';
        let currentMediaType = 'audio';
        let currentPlaylist = [];
        let originalPlaylist = [];
        let currentTrackIndex = 0;
        let isPlaying = false;
        let repeatMode = 'off'; // off, all, one
        let isShuffle = false;
        let cachedAudioTotal = null;
        let isLyricsVisible = false;
        let currentLyricsId = null;
        let listenSession = null; // { mediaId, startedAt }
        let lyricsLines = [];
        let lyricsTimeoutId = null;

        const audioPlayer = document.getElementById('audioPlayer');
        const progressFill = document.getElementById('progressFill');
        const currentTimeEl = document.getElementById('currentTime');
        const totalTimeEl = document.getElementById('totalTime');
        const qualityText = document.getElementById('qualityText');

        // Initialize on load
        document.addEventListener('DOMContentLoaded', () => {
            loadHomeContent();
            setupInfiniteScroll();
            setupSwipeGestures();
            setupTrackClickHandlers();
        });

        // Audio Player Events
        audioPlayer.addEventListener('timeupdate', updateProgress);
        audioPlayer.addEventListener('ended', handleTrackEnd);
        audioPlayer.addEventListener('loadedmetadata', () => {
            totalTimeEl.textContent = formatTime(audioPlayer.duration);
            document.getElementById('fullTrackSpec').textContent = getQualitySpec(currentPlaylist[currentTrackIndex]);
        });

        // Tab Switching
        function switchTab(tab, button) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            button.classList.add('active');
            currentTab = tab;
            document.getElementById('search').value = '';
            document.getElementById('searchSection').style.display = tab === 'search' ? 'block' : 'none';

            const playbackBar = document.getElementById('playbackBar');
            playbackBar.style.display = (tab === 'music' || tab === 'videos') ? 'flex' : 'none';

            if (tab === 'home') {
                currentMediaType = 'audio';
                loadHomeContent();
            } else if (tab === 'music') {
                currentMediaType = 'audio';
                loadLibraryContent();
            } else if (tab === 'bubbles') {
                currentMediaType = 'audio';
                loadBubblesContent();
            } else if (tab === 'graph') {
                currentMediaType = 'audio';
                loadGraphContent();
            } else if (tab === 'videos') {
                currentMediaType = 'video';
                loadVideosContent();
            } else if (tab === 'search') {
                loadSearchContent();
            } else if (tab === 'sources') {
                loadSources();
            }

            updatePlaybackBar();
        }

        // Load Home Content
        async function loadHomeContent() {
            const content = document.getElementById('content');
            content.innerHTML = '<div class="loading"><div class="spinner"></div><div>Loading…</div></div>';

            try {
                const [recentResponse, topResponse, statsResponse] = await Promise.all([
                    fetch(`${API_BASE}/media?type=audio&limit=20&sort=created_at&order=DESC`),
                    fetch(`${API_BASE}/media?type=audio&limit=20&sort=file_name&order=ASC`),
                    fetch(`${API_BASE}/stats`)
                ]);

                const recent = await recentResponse.json();
                const top = await topResponse.json();
                const stats = await statsResponse.json();

                let html = '<div style="padding: 0 16px;">';

                html += '<div class="section-header">';
                html += '<div><h2 class="section-title">FRESH</h2><div class="section-subtitle">recently added</div></div>';
                html += '</div>';

                if (recent.data && recent.data.length > 0) {
                    html += recent.data.map(track => renderAudioItem(track)).join('');
                } else {
                    html += '<div class="bubbles-empty">No tracks yet</div>';
                }

                html += '<div class="section-header">';
                html += '<div><h2 class="section-title">LIBRARY</h2><div class="section-subtitle">' + stats.audio_files + ' tracks</div></div>';
                html += '</div>';

                if (top.data && top.data.length > 0) {
                    html += top.data.map(track => renderAudioItem(track)).join('');
                }

                html += '</div>';

                content.innerHTML = html;
                setupTrackClickHandlers();
            } catch (err) {
                console.error('Home load failed:', err);
                content.innerHTML = '<div class="bubbles-empty">Failed to load</div>';
            }
        }

        // Load Library Content
        async function loadLibraryContent(reset = true) {
            const content = document.getElementById('content');
            if (reset) {
                currentPage = 0;
                hasMore = true;
                content.innerHTML = '';
            }

            try {
                const res = await fetch(`${API_BASE}/media?type=audio&limit=${PAGE_SIZE}&offset=${currentPage * PAGE_SIZE}`);
                const data = await res.json();

                const html = data.data.map(track => renderAudioItem(track)).join('');
                if (reset) {
                    content.innerHTML = html;
                } else {
                    content.innerHTML += html;
                }

                if (data.data.length < PAGE_SIZE) {
                    hasMore = false;
                }

                currentPage++;
                setupTrackClickHandlers();
            } catch (err) {
                console.error('Library load failed:', err);
            }
        }

        // Load Videos Content
        async function loadVideosContent(reset = true) {
            const content = document.getElementById('content');
            if (reset) {
                currentPage = 0;
                hasMore = true;
                content.innerHTML = '';
            }

            try {
                const res = await fetch(`${API_BASE}/media?type=video&limit=${PAGE_SIZE}&offset=${currentPage * PAGE_SIZE}`);
                const data = await res.json();

                const html = data.data.map(video => renderVideoItem(video)).join('');
                if (reset) {
                    content.innerHTML = html;
                } else {
                    content.innerHTML += html;
                }

                if (data.data.length < PAGE_SIZE) {
                    hasMore = false;
                }

                currentPage++;
                setupTrackClickHandlers();
            } catch (err) {
                console.error('Videos load failed:', err);
            }
        }

        // Load Search Content
        function loadSearchContent() {
            const content = document.getElementById('content');
            content.innerHTML = '<div class="loading"><div class="spinner"></div><div>Type to search…</div></div>';
        }

        // Load Sources Content
        async function loadSources() {
            const content = document.getElementById('content');
            let html = '<div style="padding: 0 16px;">';

            html += '<div class="source-section">';
            html += '<h3>SCAN FULL LIBRARY</h3>';
            html += '<button class="scan-button" onclick="scanLibrary()" id="scanFullBtn">SCAN NOW</button>';
            html += '<div style="font-family: \'Geist Mono\', monospace; font-size: 0.8em; color: var(--text-dim);">Re-index all configured media paths</div>';
            html += '</div>';

            html += '<div class="source-section">';
            html += '<h3>SCAN FOLDER</h3>';
            html += '<div class="input-group">';
            html += '<input type="text" id="folderPath" placeholder="/absolute/path" style="flex: 1;"/>';
            html += '<button class="scan-button" onclick="scanFolder()" style="width: auto;">SCAN</button>';
            html += '</div>';
            html += '<div style="font-family: \'Geist Mono\', monospace; font-size: 0.8em; color: var(--text-dim);">Absolute path to folder (one-time)</div>';
            html += '</div>';

            html += '<div class="source-section">';
            html += '<h3>LIBRARY STATS</h3>';

            try {
                const statsRes = await fetch(`${API_BASE}/stats`);
                const stats = await statsRes.json();

                html += '<div class="stats-card">';
                html += '<div class="stats-label">AUDIO TRACKS</div>';
                html += '<div class="stats-value">' + (stats.audio_files || 0) + '</div>';
                html += '</div>';

                html += '<div class="stats-card">';
                html += '<div class="stats-label">TOTAL SIZE</div>';
                html += '<div class="stats-value">' + formatBytes(stats.total_size_bytes) + '</div>';
                html += '</div>';

                html += '<div class="stats-card">';
                html += '<div class="stats-label">DURATION</div>';
                html += '<div class="stats-value">' + formatDuration(stats.total_duration_seconds) + '</div>';
                html += '</div>';

                if (stats.last_scan) {
                    html += '<div class="stats-card">';
                    html += '<div class="stats-label">LAST SCAN</div>';
                    html += '<div class="stats-value" style="font-size: 1em;">' + new Date(stats.last_scan.started_at * 1000).toLocaleDateString() + '</div>';
                    html += '</div>';
                }
            } catch (err) {
                html += '<div class="bubbles-empty">Failed to load stats</div>';
            }

            html += '</div>';
            html += '</div>';
            content.innerHTML = html;
        }

        // Render audio item
        function renderAudioItem(track) {
            const artwork = track.id ? `/api/thumbnail/${track.id}?width=60` : 'data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22%3E%3Crect fill=%22%23666%22 width=%22100%22 height=%22100%22/%3E%3C/svg%3E';
            const title = (track.title || track.file_name || 'Unknown').substring(0, 60);
            const artist = (track.artist || 'Unknown Artist').substring(0, 60);
            const spec = getQualitySpec(track);

            return `<div class="track-item" data-id="${track.id}" data-type="audio">
                <div class="artwork"><img src="${artwork}" alt="art" onerror="this.style.display='none'"></div>
                <div class="track-info">
                    <div class="track-title">${title}</div>
                    <div class="track-meta">${artist}</div>
                    <div class="spec-strip">${spec}</div>
                </div>
            </div>`;
        }

        // Render video item
        function renderVideoItem(video) {
            const artwork = video.id ? `/api/thumbnail/${video.id}?width=60` : 'data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22%3E%3Crect fill=%22%23666%22 width=%22100%22 height=%22100%22/%3E%3C/svg%3E';
            const title = (video.title || video.file_name || 'Unknown').substring(0, 60);
            const meta = video.width && video.height ? `${video.width}x${video.height}` : 'Video';

            return `<div class="video-item" data-id="${video.id}" data-type="video">
                <div class="artwork"><img src="${artwork}" alt="art" onerror="this.style.display='none'"></div>
                <div class="track-info">
                    <div class="track-title">${title}</div>
                    <div class="track-meta">${meta}</div>
                </div>
            </div>`;
        }

        // Get quality spec string
        function getQualitySpec(track) {
            if (!track) return '---';
            const parts = [];
            if (track.codec) parts.push(track.codec);
            if (track.sample_rate) {
                const sr = track.sample_rate / 1000;
                if (track.bits_per_sample) {
                    parts.push(`${sr}kHz · ${track.bits_per_sample}-bit`);
                } else {
                    parts.push(`${sr}kHz`);
                }
            }
            if (track.duration) {
                parts.push(formatTime(track.duration));
            }
            return parts.join(' · ') || '---';
        }

        // Format time
        function formatTime(seconds) {
            if (!seconds) return '0:00';
            const h = Math.floor(seconds / 3600);
            const m = Math.floor((seconds % 3600) / 60);
            const s = Math.floor(seconds % 60);
            if (h > 0) return `${h}:${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
            return `${m}:${s.toString().padStart(2, '0')}`;
        }

        // Format bytes
        function formatBytes(bytes) {
            if (bytes === 0) return '0 B';
            const k = 1024;
            const sizes = ['B', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
        }

        // Format duration
        function formatDuration(seconds) {
            const days = Math.floor(seconds / 86400);
            const hours = Math.floor((seconds % 86400) / 3600);
            if (days > 0) return `${days}d ${hours}h`;
            if (hours > 0) return `${hours}h`;
            const mins = Math.floor(seconds / 60);
            return `${mins}m`;
        }

        function reportListenSession(completed) {
            if (!listenSession) return;
            const seconds = Math.floor(audioPlayer.currentTime || 0);
            if (seconds >= 3) {
                fetch(`${API_BASE}/track/${listenSession.mediaId}/played`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        started_at: listenSession.startedAt,
                        seconds_listened: seconds,
                        completed: completed ? 1 : 0
                    })
                }).catch(() => {});
            }
            listenSession = null;
        }

        // Play audio
        function playAudio(track) {
            if (!track || !track.id) return;
            currentPlaylist = currentPlaylist || [track];
            originalPlaylist = originalPlaylist || [track];
            currentTrackIndex = currentPlaylist.findIndex(t => t.id === track.id);
            if (currentTrackIndex < 0) currentTrackIndex = 0;

            reportListenSession(false);
            listenSession = { mediaId: track.id, startedAt: Math.floor(Date.now() / 1000) };

            audioPlayer.src = `${API_BASE}/stream/${track.id}`;
            audioPlayer.play();
            isPlaying = true;
            updatePlayButtons();
            updateMiniPlayer();
            updateFullPlayer();
        }

        // Toggle play
        function togglePlay() {
            if (!currentPlaylist || currentPlaylist.length === 0) return;
            if (isPlaying) {
                audioPlayer.pause();
                isPlaying = false;
            } else {
                audioPlayer.play();
                isPlaying = true;
            }
            updatePlayButtons();
        }

        // Update play buttons
        function updatePlayButtons() {
            document.getElementById('miniPlayIcon').innerHTML = `<polygon points="${isPlaying ? '5 3 5 21 12 12 19 3 19 21' : '5 3 19 12 5 21 5 3'}" fill="currentColor"/>`;
            document.getElementById('fullPlayIcon').innerHTML = `<polygon points="${isPlaying ? '5 3 5 21 12 12 19 3 19 21' : '5 3 19 12 5 21 5 3'}" fill="currentColor"/>`;
        }

        // Next track
        function nextTrack() {
            if (!currentPlaylist || currentPlaylist.length === 0) return;
            currentTrackIndex = (currentTrackIndex + 1) % currentPlaylist.length;
            playAudio(currentPlaylist[currentTrackIndex]);
        }

        // Previous track
        function previousTrack() {
            if (!currentPlaylist || currentPlaylist.length === 0) return;
            currentTrackIndex = (currentTrackIndex - 1 + currentPlaylist.length) % currentPlaylist.length;
            playAudio(currentPlaylist[currentTrackIndex]);
        }

        // Seek to
        function seekTo(event) {
            const bar = event.currentTarget;
            const rect = bar.getBoundingClientRect();
            const percent = (event.clientX - rect.left) / rect.width;
            audioPlayer.currentTime = percent * audioPlayer.duration;
        }

        // Update progress
        function updateProgress() {
            if (audioPlayer.duration) {
                const percent = (audioPlayer.currentTime / audioPlayer.duration) * 100;
                progressFill.style.width = percent + '%';
                document.getElementById('miniProgressFill').style.width = percent + '%';
                currentTimeEl.textContent = formatTime(audioPlayer.currentTime);
                totalTimeEl.textContent = formatTime(audioPlayer.duration);
                updateLyricsSync();
            }
        }

        // Toggle shuffle
        async function toggleShuffle() {
            if (currentPlaylist.length === 0) {
                const res = await fetch(`${API_BASE}/media?type=audio`);
                const data = await res.json();
                currentPlaylist = data.data || [];

        // Helper: RGB to HSL conversion
        function rgbToHsl(r, g, b) {
            r /= 255; g /= 255; b /= 255;
            const max = Math.max(r, g, b), min = Math.min(r, g, b);
            let h, s, l = (max + min) / 2;

            if (max === min) {
                h = s = 0;
            } else {
                const d = max - min;
                s = l > 0.5 ? d / (2 - max - min) : d / (max + min);
                switch (max) {
                    case r: h = ((g - b) / d + (g < b ? 6 : 0)) / 6; break;
                    case g: h = ((b - r) / d + 2) / 6; break;
                    case b: h = ((r - g) / d + 4) / 6; break;
                }
            }
            return { h, s, l };
        }

        // Extract album colors for dynamic background
        function extractAlbumColors(img) {
            try {
                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');
                canvas.width = 100;
                canvas.height = 100;

                ctx.drawImage(img, 0, 0, 100, 100);
                const imageData = ctx.getImageData(0, 0, 100, 100).data;

                // Collect colors and their frequencies
                const colorBuckets = {};

                for (let i = 0; i < imageData.length; i += 4) {
                    const r = imageData[i];
                    const g = imageData[i + 1];
                    const b = imageData[i + 2];
                    const a = imageData[i + 3];

                    if (a < 128) continue; // Skip transparent pixels

                    // Convert to HSL for better color analysis
                    const hsl = rgbToHsl(r, g, b);

                    // Skip very dark, very light, and low saturation colors
                    if (hsl.l < 0.15 || hsl.l > 0.85 || hsl.s < 0.2) continue;

                    // Bucket by hue (36 buckets of 10 degrees each)
                    const hueBucket = Math.floor(hsl.h * 36);
                    const key = hueBucket;

                    if (!colorBuckets[key]) {
                        colorBuckets[key] = { r: 0, g: 0, b: 0, count: 0, saturation: 0 };
                    }
                    colorBuckets[key].r += r;
                    colorBuckets[key].g += g;
                    colorBuckets[key].b += b;
                    colorBuckets[key].saturation += hsl.s;
                    colorBuckets[key].count++;
                }

                // Find the most vibrant dominant color
                let bestBucket = null;
                let bestScore = 0;

                for (const key in colorBuckets) {
                    const bucket = colorBuckets[key];
                    // Score by count * saturation to prefer vibrant colors
                    const score = bucket.count * (bucket.saturation / bucket.count);
                    if (score > bestScore) {
                        bestScore = score;
                        bestBucket = bucket;
                    }
                }

                if (!bestBucket || bestBucket.count === 0) {
                    return { primary: '#d4a574', dark: '#5a4a3a' };
                }

                const r = Math.floor(bestBucket.r / bestBucket.count);
                const g = Math.floor(bestBucket.g / bestBucket.count);
                const b = Math.floor(bestBucket.b / bestBucket.count);

                // Create vibrant primary color
                const primary = `rgb(${r}, ${g}, ${b})`;

                // Create dark version for gradient background
                const darkR = Math.floor(r * 0.3);
                const darkG = Math.floor(g * 0.3);
                const darkB = Math.floor(b * 0.3);
                const dark = `rgb(${darkR}, ${darkG}, ${darkB})`;

                return { primary, dark };
            } catch (e) {
                console.log('Color extraction error:', e);
                return { primary: '#d4a574', dark: '#5a4a3a' };
            }
        }

        // Setup swipe gestures
        function setupSwipeGestures() {
            let startX = 0;
            let startY = 0;
            let isSwiping = false;

            const miniPlayer = document.getElementById('miniPlayer');
            const fullPlayer = document.getElementById('fullPlayer');
            const miniContent = miniPlayer.querySelector('.mini-player-content');

            // Swipe gestures on mini player
            miniPlayer.addEventListener('touchstart', (e) => {
                if (e.target.closest('.mini-controls')) return;
                startX = e.touches[0].clientX;
                startY = e.touches[0].clientY;
                isSwiping = true;
            }, { passive: true });

            miniPlayer.addEventListener('touchmove', (e) => {
                if (!isSwiping || e.target.closest('.mini-controls')) return;
                const currentX = e.touches[0].clientX;
                const deltaX = currentX - startX;

                // Add visual feedback for horizontal swipe
                if (Math.abs(deltaX) > 10) {
                    miniContent.style.transform = `translateX(${deltaX * 0.3}px)`;
                    miniContent.style.transition = 'none';
                }
            }, { passive: true });

            miniPlayer.addEventListener('touchend', (e) => {
                if (!isSwiping || e.target.closest('.mini-controls')) {
                    isSwiping = false;
                    return;
                }

                const endX = e.changedTouches[0].clientX;
                const endY = e.changedTouches[0].clientY;

                const swipeDistanceX = endX - startX;
                const swipeDistanceY = startY - endY;

                // Reset transform with animation
                miniContent.style.transition = 'transform 0.3s cubic-bezier(0.4, 0, 0.2, 1)';
                miniContent.style.transform = 'translateX(0)';

                // Horizontal swipe (skip tracks)
                if (Math.abs(swipeDistanceX) > 60 && Math.abs(swipeDistanceX) > Math.abs(swipeDistanceY)) {
                    if (swipeDistanceX > 0) {
                        previousTrack(); // Swipe right = previous
                    } else {
                        nextTrack(); // Swipe left = next
                    }
                }
                // Vertical swipe (open full player)
                else if (swipeDistanceY > 50) {
                    openFullPlayer();
                }

                isSwiping = false;
            });

            // Swipe down on full player
            fullPlayer.addEventListener('touchstart', (e) => {
                if (e.target.closest('.control-btn, .progress-bar, .lyrics-panel')) return;
                startY = e.touches[0].clientY;
            }, { passive: true });

            fullPlayer.addEventListener('touchend', (e) => {
                if (e.target.closest('.control-btn, .progress-bar, .lyrics-panel')) return;
                const endY = e.changedTouches[0].clientY;
                const swipeDistance = endY - startY;

                if (swipeDistance > 100) { // Swipe down
                    closeFullPlayer();
                }
            });
        }
