        // ===== Bubbles Tab (constellation + drill-down) =====
        const CATEGORY_COLORS = {
          genre:  '#1db954',
          artist: '#3ddc84',
          decade: '#e0b878',
          format: '#c8956d',
          recent: '#a0a0ff',
        };

        const CATEGORY_GRADIENTS = {
          genre:   ['#2dd06a', '#1db954', '#0e6e34'],
          artist:  ['#5be29c', '#3ddc84', '#1f7a48'],
          decade:  ['#f0c890', '#e0b878', '#7a5d35'],
          format:  ['#dba574', '#c8956d', '#6e4f33'],
          recent:  ['#bcbcff', '#a0a0ff', '#4f4f8a'],
          track:   ['#8be0a8', '#5fb87f', '#2e6b44'],
        };

        let bubblesChart = null;
        let bubblesFacet = null;      // null = constellation; 'genre'|'artist'|'decade'|'format'|'recent' = drill
        let bubblesPath = [];         // drill-down stack
        let bubbleLeafTracks = [];    // leaf level tracks for playback
        let bubbleAutoPlay = false;   // After bubble playlist ends, keep playing random tracks

        function escapeHtml(s) {
          return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
        }

        class LiveBubbles {
          constructor() {
            this.container = null;
            this.svg = null;
            this.rootG = null;
            this.nodes = [];
            this.sim = null;
            this.width = 0;
            this.height = 0;
            this.onClickHandler = null;
            this.resizeObserver = null;
            this.resizeTimeout = null;
            this.pulseTimelines = [];
            this.hoverTimelines = new Map();
          }

          mount(container) {
            if (this.svg && this.svg.parentNode === container) return;

            this.container = container;
            container.innerHTML = '';

            this.width = container.clientWidth || 800;
            this.height = container.clientHeight || 600;

            this.svg = d3.create('svg')
              .attr('width', this.width)
              .attr('height', this.height)
              .attr('style', 'display: block; width: 100%; height: 100%;');

            const defs = this.svg.append('defs');
            this._createGradients(defs);
            this._createGlowFilter(defs);

            this.rootG = this.svg.append('g');

            container.appendChild(this.svg.node());

            this.focusChip = document.createElement('div');
            this.focusChip.className = 'bubble-focus-chip';
            container.appendChild(this.focusChip);

            this._setupResizeObserver();
          }

          _createGradients(defs) {
            for (const [category, colors] of Object.entries(CATEGORY_GRADIENTS)) {
              const grad = defs.append('radialGradient')
                .attr('id', `grad-${category}`)
                .attr('cx', '30%')
                .attr('cy', '25%')
                .attr('r', '70%');

              grad.append('stop').attr('offset', '0%').attr('stop-color', colors[0]);
              grad.append('stop').attr('offset', '60%').attr('stop-color', colors[1]);
              grad.append('stop').attr('offset', '100%').attr('stop-color', colors[2]);
            }
          }

          _createGlowFilter(defs) {
            const filter = defs.append('filter')
              .attr('id', 'bubble-glow')
              .attr('x', '-50%')
              .attr('y', '-50%')
              .attr('width', '200%')
              .attr('height', '200%');

            filter.append('feGaussianBlur')
              .attr('stdDeviation', '4')
              .attr('result', 'blur');

            filter.append('feFlood')
              .attr('flood-color', '#d4a574')
              .attr('flood-opacity', '0.6')
              .attr('result', 'glow');

            filter.append('feComposite')
              .attr('in', 'glow')
              .attr('in2', 'blur')
              .attr('operator', 'in')
              .attr('result', 'softGlow');

            filter.append('feMerge')
              .selectAll('feMergeNode')
              .data(['softGlow', 'SourceGraphic'])
              .enter()
              .append('feMergeNode')
              .attr('in', d => d);
          }

          _setupResizeObserver() {
            if (this.resizeObserver) this.resizeObserver.disconnect();

            this.resizeObserver = new ResizeObserver(() => {
              if (this.resizeTimeout) clearTimeout(this.resizeTimeout);
              this.resizeTimeout = setTimeout(() => {
                this._handleResize();
              }, 150);
            });

            if (this.container) {
              this.resizeObserver.observe(this.container);
            }
          }

          _handleResize() {
            const newWidth = this.container.clientWidth || 800;
            const newHeight = this.container.clientHeight || 600;

            if (newWidth !== this.width || newHeight !== this.height) {
              this.width = newWidth;
              this.height = newHeight;

              this.svg
                .attr('width', newWidth)
                .attr('height', newHeight);

              if (this.nodes.length > 0) {
                this._updateForcePositions();
                if (this.sim) {
                  this.sim.force('x', d3.forceX(d => d.targetX).strength(0.06));
                  this.sim.force('y', d3.forceY(d => d.targetY).strength(0.06));
                  this.sim.alpha(0.3).restart();
                }
              }
            }
          }

          setData(nodes, opts = {}) {
            this.nodes = nodes.map(n => ({
              ...n,
              id: n.id || Math.random().toString(),
              x: this.width / 2 + (Math.random() - 0.5) * 100,
              y: this.height / 2 + (Math.random() - 0.5) * 100,
              targetX: 0,
              targetY: 0,
              r: Math.sqrt(Math.max(n.value, 1)) * 5,
              fx: null,
              fy: null,
            }));

            this._updateForcePositions();

            if (opts.spawnFromEdge) {
              const rad = 1.4 * Math.max(this.width, this.height);
              const cx = this.width / 2;
              const cy = this.height / 2;
              this.nodes.forEach(n => {
                const angle = Math.random() * 2 * Math.PI;
                n.x = cx + rad * Math.cos(angle);
                n.y = cy + rad * Math.sin(angle);
              });
            }

            this._stopSimulation();
            this._createSimulation();
            this._renderBubbles();
            this._startPulseAnimation();
          }

          _updateForcePositions() {
            const hierarchy = d3.hierarchy({ children: this.nodes })
              .sum(d => Math.max(d.value, 1));

            const packed = d3.pack()
              .size([this.width, this.height])
              .padding(2)(hierarchy);

            const leaves = packed.leaves();
            leaves.forEach(leaf => {
              const originalNode = this.nodes.find(n => n === leaf.data);
              if (originalNode) {
                originalNode.targetX = leaf.x;
                originalNode.targetY = leaf.y;
                originalNode.r = leaf.r;
              }
            });
          }

          _createSimulation() {
            this.sim = d3.forceSimulation(this.nodes)
              .force('collide', d3.forceCollide(d => d.r + 1.5).strength(0.9))
              .force('x', d3.forceX(d => d.targetX).strength(0.06))
              .force('y', d3.forceY(d => d.targetY).strength(0.06))
              .force('charge', d3.forceManyBody().strength(-4))
              .alphaDecay(0)
              .alphaTarget(0.04)
              .on('tick', () => this._tick());
          }

          _tick() {
            this.rootG.selectAll('.bubble')
              .attr('transform', d => `translate(${d.x},${d.y})`);
          }

          _renderBubbles() {
            const bubbles = this.rootG.selectAll('.bubble').data(this.nodes, d => d.id);

            const enter = bubbles.enter().append('g')
              .attr('class', 'bubble')
              .attr('data-category', d => d.category || '')
              .attr('transform', d => `translate(${d.x},${d.y})`);

            enter.append('circle')
              .attr('r', d => d.r)
              .attr('fill', d => {
                const cat = d.category || 'track';
                return `url(#grad-${cat})`;
              });

            enter.append('text')
              .attr('font-size', d => {
                const size = Math.max(8, Math.min(d.r * 0.32, 14));
                return `${size}px`;
              })
              .text(d => {
                if (d.r > 32) return d.name;
                if (d.r > 14) {
                  const max = Math.max(3, Math.floor(d.r / 3));
                  return d.name.length > max ? d.name.slice(0, max - 1) + '…' : d.name;
                }
                return '';
              })
              .style('display', d => d.r > 14 ? 'block' : 'none');

            enter
              .on('mouseenter', (e, d) => this._onBubbleHover(e, d, true))
              .on('mouseleave', (e, d) => this._onBubbleHover(e, d, false))
              .on('touchstart', (e, d) => this._onBubbleHover(e, d, true))
              .on('touchend', (e, d) => this._onBubbleHover(e, d, false))
              .on('click', (e, d) => this._onBubbleClick(e, d));

            d3.select(this.svg.node()).call(d3.drag()
              .on('start', (e, d) => {
                if (!d) return;
                this.sim.alphaTarget(0.3).restart();
                d.fx = d.x;
                d.fy = d.y;
              })
              .on('drag', (e, d) => {
                if (!d) return;
                d.fx = e.x;
                d.fy = e.y;
              })
              .on('end', (e, d) => {
                if (!d) return;
                this.sim.alphaTarget(0.04);
                d.fx = null;
                d.fy = null;
              }));

            bubbles.exit().remove();

            this.nodes.forEach((n, i) => {
              n.elem = document.querySelector(`.bubble[data-category="${n.category || ''}"]`);
            });
          }

          _onBubbleHover(e, d, isEnter) {
            const g = e.currentTarget;
            const circle = d3.select(g).select('circle');

            if (this.hoverTimelines.has(d.id)) {
              this.hoverTimelines.get(d.id).kill();
            }

            if (isEnter) {
              g.setAttribute('data-hover', 'true');
              const tl = gsap.timeline();
              tl.to(circle.node(), { attr: { r: d.r * 1.08 } }, 0);
              this.hoverTimelines.set(d.id, tl);

              if (this.sim) {
                this.sim.alphaTarget(0.15).restart();
              }

              if (this.focusChip) {
                const count = (d.payload && d.payload.__count) || d.count || null;
                const meta = count != null ? `<span class="chip-meta">· ${count}</span>` : '';
                this.focusChip.innerHTML = this._escapeChip(d.name) + meta;
                this.focusChip.setAttribute('data-visible', 'true');
              }
            } else {
              g.removeAttribute('data-hover');
              const tl = gsap.timeline();
              tl.to(circle.node(), { attr: { r: d.r } }, 0);
              this.hoverTimelines.set(d.id, tl);

              if (this.sim) {
                this.sim.alphaTarget(0.04);
              }

              if (this.focusChip) {
                this.focusChip.removeAttribute('data-visible');
              }
            }
          }

          _escapeChip(s) {
            return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
          }

          _onBubbleClick(e, d) {
            if (this.onClickHandler) {
              this.onClickHandler(d);
            }
          }

          onClick(handler) {
            this.onClickHandler = handler;
          }

          async drillTransition(clickedNode, newNodes) {
            const cx = this.width / 2;
            const cy = this.height / 2;
            const others = this.nodes.filter(n => n !== clickedNode);

            if (clickedNode.elem) {
              gsap.to(clickedNode.elem, {
                attr: { cx: cx, cy: cy },
                scale: 2.2,
                opacity: 0,
                duration: 0.45,
                ease: 'power3.in',
              });
            }

            gsap.to(others.map(n => n.elem).filter(Boolean), {
              scale: 0.4,
              opacity: 0,
              duration: 0.4,
              stagger: 0.004,
            });

            await new Promise(r => setTimeout(r, 450));

            this.setData(newNodes, { spawnFromEdge: true });

            gsap.fromTo(this.rootG.node(), { scale: 1.04 }, {
              scale: 1.0,
              duration: 0.6,
              ease: 'power2.out',
            });
          }

          async reverseTransition(newNodes) {
            const others = this.nodes;

            gsap.to(others.map(n => n.elem).filter(Boolean), {
              scale: 0.3,
              opacity: 0,
              duration: 0.35,
              stagger: 0.003,
            });

            await new Promise(r => setTimeout(r, 350));

            this.setData(newNodes, { spawnFromEdge: false });

            const rad = 1.4 * Math.max(this.width, this.height);
            const cx = this.width / 2;
            const cy = this.height / 2;

            this.nodes.forEach(n => {
              const angle = Math.random() * 2 * Math.PI;
              n.x = cx + rad * Math.cos(angle);
              n.y = cy + rad * Math.sin(angle);
            });

            if (this.sim) {
              this.sim.alpha(0.5).restart();
            }

            await new Promise(r => setTimeout(r, 50));

            gsap.fromTo(this.rootG.node(), { scale: 0.9 }, {
              scale: 1.0,
              duration: 0.5,
              ease: 'power2.out',
            });
          }

          _startPulseAnimation() {
            this._clearPulses();

            if (bubblesFacet === null) {
              const categoryGroups = {};
              this.nodes.forEach(n => {
                if (!categoryGroups[n.category]) {
                  categoryGroups[n.category] = [];
                }
                categoryGroups[n.category].push(n);
              });

              for (const [cat, nodes] of Object.entries(categoryGroups)) {
                if (nodes.length > 0) {
                  const largest = nodes.reduce((a, b) => a.value > b.value ? a : b);
                  const elem = this.rootG.selectAll('.bubble').filter(d => d === largest).select('circle').node();
                  if (elem) {
                    const tl = gsap.timeline({ repeat: -1 });
                    tl.to(elem, { attr: { 'fill-opacity': 0.85 } }, 0)
                      .to(elem, { attr: { 'fill-opacity': 1.0 } }, 0.5, 0)
                      .to(elem, { attr: { 'fill-opacity': 0.85 } }, 1.5, 0);
                    this.pulseTimelines.push(tl);
                  }
                }
              }
            }
          }

          _clearPulses() {
            this.pulseTimelines.forEach(tl => tl.kill());
            this.pulseTimelines = [];
          }

          _stopSimulation() {
            if (this.sim) {
              this.sim.stop();
            }
            this._clearPulses();
            this.hoverTimelines.forEach(tl => tl.kill());
            this.hoverTimelines.clear();
          }

          destroy() {
            this._stopSimulation();
            if (this.resizeObserver) {
              this.resizeObserver.disconnect();
            }
            if (this.resizeTimeout) {
              clearTimeout(this.resizeTimeout);
            }
            if (this.svg && this.svg.node()) {
              this.svg.node().remove();
            }
            this.svg = null;
            this.rootG = null;
            this.nodes = [];
          }
        }

        function openCategoryDrill(category, bucketName) {
          bubblesFacet = category;
          bubblesPath = [bucketName];
          renderBubbles();
        }

        async function loadBubblesContent() {
          const content = document.getElementById('content');
          content.innerHTML = '<div id="bubblesChart"><div class="loading" style="padding-top: 80px;"><div class="spinner"></div><div>Loading…</div></div></div>';

          try {
            const res = await fetch(`${API_BASE}/bubbles/top`);
            const payload = await res.json();
            window._lastConstellationPayload = payload;
            renderConstellation(payload);
          } catch (err) {
            console.error('Bubbles load failed:', err);
            document.getElementById('bubblesChart').innerHTML = '<div class="bubbles-empty">Failed to load bubbles</div>';
          }
        }

        function renderConstellation(payload) {
          const el = document.getElementById('bubblesChart');
          bubblesFacet = null;
          bubblesPath = [];

          const allBubbles = [];
          for (const facet of (payload.facets || [])) {
            for (const bucket of (facet.buckets || [])) {
              allBubbles.push({
                id: `${facet.key}-${bucket.name}`,
                name: bucket.name,
                value: Math.sqrt(bucket.count),
                category: facet.key,
                isLeaf: false,
                payload: {
                  __category: facet.key,
                  __count: bucket.count,
                },
              });
            }
          }

          el.innerHTML = '<div id="bubblesMount" style="position:absolute;inset:0;"></div><div id="bubblesLegend" style="position:absolute;bottom:12px;left:12px;display:flex;gap:6px;flex-wrap:wrap;z-index:2;"></div>';

          const mount = document.getElementById('bubblesMount');
          const legend = document.getElementById('bubblesLegend');

          legend.innerHTML = Object.entries(CATEGORY_COLORS)
            .map(([cat, col]) => `<div style="display:flex;align-items:center;gap:4px;font-size:0.75em;color:rgba(255,255,255,0.7);"><div style="width:10px;height:10px;background:${col};border-radius:50%;"></div><span>${cat}</span></div>`)
            .join('');

          if (!bubblesChart) {
            bubblesChart = new LiveBubbles();
          }

          bubblesChart.mount(mount);
          bubblesChart.setData(allBubbles);
          bubblesChart.onClick(node => {
            if (node && node.payload && node.payload.__category) {
              openCategoryDrill(node.payload.__category, node.name);
            }
          });
        }

        async function renderBubbles() {
          const el = document.getElementById('bubblesChart');
          if (!el || !bubblesFacet) return;

          el.innerHTML = '<div class="breadcrumbs"><span id="bubblesCrumbs"></span></div><div id="bubblesMount" style="position:absolute;inset:0;"></div>';

          const path = bubblesPath;
          const crumbs = document.getElementById('bubblesCrumbs');
          const parts = ['<span data-crumb-action="reset" style="cursor:pointer;">All</span>'];
          path.forEach((val, i) => {
            parts.push(`<span data-crumb-action="slice" data-slice-index="${i}" style="cursor:pointer;">${escapeHtml(val)}</span>`);
          });
          crumbs.innerHTML = parts.join('<span style="opacity:.4;padding:0 2px">›</span>');
          crumbs.querySelectorAll('span[data-crumb-action]').forEach(span => {
            span.style.background = 'rgba(0,0,0,0.45)';
            span.style.padding = '4px 10px';
            span.style.borderRadius = '12px';
            span.style.backdropFilter = 'blur(8px)';
            span.addEventListener('click', () => {
              const action = span.getAttribute('data-crumb-action');
              if (action === 'reset') {
                bubblesPath = [];
                renderConstellation(window._lastConstellationPayload);
              } else if (action === 'slice') {
                const idx = parseInt(span.getAttribute('data-slice-index'), 10);
                bubblesPath = bubblesPath.slice(0, idx);
                renderBubbles();
              }
            });
          });

          try {
            const pathJson = JSON.stringify(path);
            const res = await fetch(`${API_BASE}/bubbles/drill?facet=${encodeURIComponent(bubblesFacet)}&path=${encodeURIComponent(pathJson)}`);
            const result = await res.json();

            const mount = document.getElementById('bubblesMount');

            if (result.atLeaf) {
              bubbleLeafTracks = result.leafTracks || [];
              const bubbles = bubbleLeafTracks.map(t => ({
                id: `track-${t.id}`,
                name: t.title || t.file_name || `#${t.id}`,
                value: Math.max(1, Math.round((t.duration || 60) / 30)),
                category: bubblesFacet,
                isLeaf: true,
                payload: { __track: t },
              }));

              if (bubbles.length === 0) {
                mount.innerHTML = '<div class="bubbles-empty">No tracks here.</div>';
                return;
              }

              if (!bubblesChart) {
                bubblesChart = new LiveBubbles();
              }

              bubblesChart.mount(mount);
              bubblesChart.setData(bubbles);
              bubblesChart.onClick(node => {
                if (node && node.payload && node.payload.__track) {
                  currentPlaylist = bubbleLeafTracks;
                  originalPlaylist = [...bubbleLeafTracks];
                  bubbleAutoPlay = true;
                  playAudio(node.payload.__track);
                }
              });
            } else {
              const buckets = result.buckets || [];
              if (buckets.length === 0) {
                mount.innerHTML = '<div class="bubbles-empty">No items here.</div>';
                return;
              }

              const bubbles = buckets.map(b => ({
                id: `bucket-${b.name}`,
                name: b.name,
                value: Math.sqrt(b.count),
                category: bubblesFacet,
                isLeaf: false,
                payload: { __count: b.count },
              }));

              if (!bubblesChart) {
                bubblesChart = new LiveBubbles();
              }

              bubblesChart.mount(mount);
              bubblesChart.setData(bubbles);
              bubblesChart.onClick(node => {
                if (node) {
                  bubblesPath = [...bubblesPath, node.name];
                  renderBubbles();
                }
              });
            }
          } catch (err) {
            console.error('Drill failed:', err);
            const mount = document.getElementById('bubblesMount');
            if (mount) {
              mount.innerHTML = '<div class="bubbles-empty">Drill failed</div>';
            }
          }
        }

        // Load Graph Content
        async function loadGraphContent() {
            const content = document.getElementById('content');
            content.innerHTML = '<div class="loading"><div class="spinner"></div><div>Building graph…</div></div>';

            try {
                const res = await fetch(`${API_BASE}/bubbles/graph`);
                if (res.ok) {
                    const data = await res.json();
                    content.innerHTML = '<div id="graph" class="graph-container"><svg id="graphSvg"></svg></div>';
                    graphChart = new LiveGraph(document.getElementById('graph'), data);
                    graphChart.mount();
                } else {
                    // Try to rebuild
                    const rebuildRes = await fetch(`${API_BASE}/bubbles/graph/rebuild`, { method: 'POST' });
                    if (rebuildRes.ok) {
                        setTimeout(() => loadGraphContent(), 500);
                    } else {
                        content.innerHTML = '<div class="bubbles-empty">Graph snapshot not ready</div>';
                    }
                }
            } catch (err) {
                console.error('Graph load failed:', err);
                content.innerHTML = '<div class="bubbles-empty">Failed to load graph</div>';
            }
        }

        // LiveGraph class
        let graphChart = null;

        class LiveGraph {
            constructor(el, data) {
                this.el = el;
                this.payload = data;
                this.svg = null;
                this.simulation = null;
                this.focusedNodeId = null;
                this.expandedAlbums = new Map();   // albumId -> [trackNodeId,...]
                this.nodeMap = new Map();
                this.root = null;
                this.linkSel = null;
                this.nodeSel = null;
                this.labelSel = null;
            }

            mount() {
                this.svg = d3.select(this.el).select('#graphSvg');
                if (this.payload && this.payload.nodes && this.payload.nodes.length > 0) {
                    this.render();
                } else {
                    this.el.innerHTML = '<div class="bubbles-empty" style="height: 100%; display: flex; align-items: center; justify-content: center;">No graph data</div>';
                }
            }

            render() {
                const width = this.el.offsetWidth;
                const height = this.el.offsetHeight;
                const nodes = this.payload.nodes;
                const links = this.payload.links;

                this.nodeMap.clear();
                nodes.forEach(n => this.nodeMap.set(n.id, n));

                const radiusScale = d3.scaleSqrt()
                    .domain([d3.min(nodes, d => d.value), d3.max(nodes, d => d.value)])
                    .range([2, 24]);

                nodes.forEach(n => {
                    if (n.type === 'track') { n.r = 4; return; }
                    n.r = radiusScale(n.value);
                    if (n.type === 'genre') n.r *= 1.3;
                });

                this.svg.selectAll('*').remove();
                this.root = this.svg.append('g').attr('class', 'graph-root');

                this.simulation = d3.forceSimulation(nodes)
                    .force('link', d3.forceLink(links)
                        .id(d => d.id)
                        .distance(d => {
                            const src = typeof d.source === 'string' ? this.nodeMap.get(d.source) : d.source;
                            const tgt = typeof d.target === 'string' ? this.nodeMap.get(d.target) : d.target;
                            if (src?.type === 'track' || tgt?.type === 'track') return 18;
                            const isGenre = src?.type === 'genre' || tgt?.type === 'genre';
                            return isGenre ? 80 : 30;
                        })
                        .strength(0.4))
                    .force('charge', d3.forceManyBody()
                        .strength(d => d.type === 'genre' ? -180 : (d.type === 'track' ? -20 : -40)))
                    .force('center', d3.forceCenter(width / 2, height / 2))
                    .force('collide', d3.forceCollide().radius(d => d.r + 1))
                    .alphaDecay(0.05);

                this.simulation.on('tick', () => this._tick());

                const zoom = d3.zoom()
                    .scaleExtent([0.2, 6])
                    .on('zoom', (e) => this.root.attr('transform', e.transform));
                this.svg.call(zoom).on('dblclick.zoom', null);

                this.svg.on('click', () => this.clearFocus());

                this._joinSelections();
            }

            _joinSelections() {
                const nodes = this.payload.nodes;
                const links = this.payload.links;

                this.linkSel = this.root.selectAll('.graph-link')
                    .data(links, d => `${typeof d.source === 'string' ? d.source : d.source.id}->${typeof d.target === 'string' ? d.target : d.target.id}`)
                    .join('line')
                    .attr('class', 'graph-link');

                this.nodeSel = this.root.selectAll('.graph-node')
                    .data(nodes, d => d.id)
                    .join(
                        enter => enter.append('circle')
                            .attr('class', 'graph-node')
                            .attr('opacity', 0.7)
                            .call(d3.drag()
                                .on('start', (e, d) => {
                                    if (!e.active) this.simulation.alphaTarget(0.3).restart();
                                    d.fx = d.x; d.fy = d.y;
                                })
                                .on('drag', (e, d) => { d.fx = e.x; d.fy = e.y; })
                                .on('end', (e, d) => {
                                    if (!e.active) this.simulation.alphaTarget(0);
                                    d.fx = null; d.fy = null;
                                }))
                            .on('click', (e, d) => {
                                e.stopPropagation();
                                this.handleNodeClick(d);
                            }),
                        update => update,
                        exit => exit.remove()
                    )
                    .attr('r', d => d.r)
                    .attr('fill', d => this._fillFor(d));

                this.labelSel = this.root.selectAll('.graph-label')
                    .data(this.payload.nodes.filter(d => d.type === 'genre' || d.type === 'track'), d => d.id)
                    .join('text')
                    .attr('class', d => d.type === 'track' ? 'graph-label graph-track-label' : 'graph-label')
                    .text(d => {
                        const max = d.type === 'track' ? 22 : 12;
                        return d.label.length > max ? d.label.substring(0, max - 1) + '…' : d.label;
                    });
            }

            _fillFor(d) {
                if (d.type === 'genre') return 'var(--accent-rust)';
                if (d.type === 'track') return 'var(--accent)';
                return 'var(--accent)';
            }

            _tick() {
                if (this.linkSel) {
                    this.linkSel
                        .attr('x1', d => d.source.x)
                        .attr('y1', d => d.source.y)
                        .attr('x2', d => d.target.x)
                        .attr('y2', d => d.target.y);
                }
                if (this.nodeSel) {
                    this.nodeSel.attr('cx', d => d.x).attr('cy', d => d.y);
                }
                if (this.labelSel) {
                    this.labelSel
                        .attr('x', d => d.x)
                        .attr('y', d => d.y - d.r - 4);
                }
            }

            handleNodeClick(node) {
                if (node.type === 'track') {
                    this.playTrack(node);
                    return;
                }
                if (node.type === 'album') {
                    if (this.expandedAlbums.has(node.id)) {
                        this.collapseAlbum(node);
                    } else {
                        this.expandAlbum(node);
                    }
                    return;
                }
                this.focusNode(node);
            }

            async expandAlbum(albumNode) {
                if (!albumNode.artist || !albumNode.label) return;
                this.focusNode(albumNode);
                try {
                    const url = `${API_BASE}/media?type=audio&artist=${encodeURIComponent(albumNode.artist)}&album=${encodeURIComponent(albumNode.label)}&limit=1000`;
                    const res = await fetch(url);
                    const result = await res.json();
                    const tracks = result.data || [];
                    if (tracks.length === 0) {
                        showToast('No tracks found');
                        return;
                    }

                    const trackNodes = tracks.map((t, i) => {
                        const angle = (i / tracks.length) * 2 * Math.PI;
                        return {
                            id: `t:${t.id}`,
                            type: 'track',
                            label: t.title || t.file_name || `#${t.id}`,
                            value: 1,
                            artist: albumNode.artist,
                            album: albumNode.label,
                            trackData: t,
                            parentAlbumId: albumNode.id,
                            r: 4,
                            x: albumNode.x + Math.cos(angle) * (albumNode.r + 18),
                            y: albumNode.y + Math.sin(angle) * (albumNode.r + 18),
                        };
                    });
                    const trackLinks = trackNodes.map(tn => ({ source: albumNode.id, target: tn.id }));

                    this.expandedAlbums.set(albumNode.id, trackNodes.map(n => n.id));
                    this.payload.nodes.push(...trackNodes);
                    this.payload.links.push(...trackLinks);
                    trackNodes.forEach(n => this.nodeMap.set(n.id, n));

                    this.simulation.nodes(this.payload.nodes);
                    this.simulation.force('link').links(this.payload.links);
                    this._joinSelections();
                    this.simulation.alpha(0.6).restart();
                    showToast(`${tracks.length} tracks · tap to play`);
                } catch (err) {
                    console.error('Album expand failed:', err);
                    showToast('Could not load tracks');
                }
            }

            collapseAlbum(albumNode) {
                const trackIds = this.expandedAlbums.get(albumNode.id);
                if (!trackIds) return;
                const idSet = new Set(trackIds);
                this.payload.nodes = this.payload.nodes.filter(n => !idSet.has(n.id));
                this.payload.links = this.payload.links.filter(l => {
                    const s = typeof l.source === 'string' ? l.source : l.source.id;
                    const t = typeof l.target === 'string' ? l.target : l.target.id;
                    return !idSet.has(s) && !idSet.has(t);
                });
                trackIds.forEach(id => this.nodeMap.delete(id));
                this.expandedAlbums.delete(albumNode.id);

                this.simulation.nodes(this.payload.nodes);
                this.simulation.force('link').links(this.payload.links);
                this._joinSelections();
                this.simulation.alpha(0.4).restart();
            }

            playTrack(node) {
                if (!node.trackData) return;
                const siblings = (this.expandedAlbums.get(node.parentAlbumId) || [node.id])
                    .map(id => this.nodeMap.get(id))
                    .filter(n => n && n.trackData)
                    .map(n => n.trackData);

                if (siblings.length > 0) {
                    currentPlaylist = siblings;
                    originalPlaylist = [...siblings];
                    currentTrackIndex = siblings.findIndex(t => t.id === node.trackData.id);
                    if (currentTrackIndex < 0) currentTrackIndex = 0;
                } else {
                    currentPlaylist = [node.trackData];
                    originalPlaylist = [node.trackData];
                    currentTrackIndex = 0;
                }
                playAudio(node.trackData);
                showToast(`Playing ${node.label}`);
            }

            focusNode(node) {
                this.focusedNodeId = node.id;
                const neighborhood = new Set([node.id]);
                this.payload.links.forEach(link => {
                    const s = typeof link.source === 'string' ? link.source : link.source.id;
                    const t = typeof link.target === 'string' ? link.target : link.target.id;
                    if (s === node.id) neighborhood.add(t);
                    if (t === node.id) neighborhood.add(s);
                });

                if (this.nodeSel) {
                    this.nodeSel
                        .attr('fill', d => neighborhood.has(d.id) ? this._fillFor(d) : 'var(--text-subdued)')
                        .attr('opacity', d => neighborhood.has(d.id) ? 0.9 : 0.2);
                }
                if (this.linkSel) {
                    this.linkSel
                        .classed('active', link => {
                            const s = typeof link.source === 'string' ? link.source : link.source.id;
                            const t = typeof link.target === 'string' ? link.target : link.target.id;
                            return s === node.id || t === node.id;
                        })
                        .attr('opacity', link => {
                            const s = typeof link.source === 'string' ? link.source : link.source.id;
                            const t = typeof link.target === 'string' ? link.target : link.target.id;
                            return (s === node.id || t === node.id) ? 0.5 : 0.15;
                        });
                }
            }

            clearFocus() {
                this.focusedNodeId = null;
                if (this.nodeSel) {
                    this.nodeSel
                        .attr('fill', d => this._fillFor(d))
                        .attr('opacity', 0.7);
                }
                if (this.linkSel) {
                    this.linkSel.classed('active', false).attr('opacity', 0.15);
                }
            }
        }

        // Initialize search on DOMContentLoaded if not already done
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', () => {
                const searchInput = document.getElementById('search');
                if (searchInput) {
                    searchInput.addEventListener('input', (e) => {
                        clearTimeout(searchTimeout);
                        searchTimeout = setTimeout(() => {
                            performSearch(e.target.value);
                        }, 300);
                    });
                }
            });
        } else {
            const searchInput = document.getElementById('search');
            if (searchInput) {
                searchInput.addEventListener('input', (e) => {
                    clearTimeout(searchTimeout);
                    searchTimeout = setTimeout(() => {
                        performSearch(e.target.value);
                    }, 300);
                });
            }
        }
    </script>
</body>
</html>
