        async function scanLibrary() {
            const btn = document.getElementById('scanAllBtn');
            if (!btn) return;
            btn.disabled = true;
            btn.textContent = 'Scanning…';
            try {
                const res = await fetch(`${API_BASE}/scan`, { method: 'POST' });
                if (res.ok) {
                    showToast('Full library scan started');
                } else {
                    const err = await res.json();
                    showToast('Error: ' + (err.error || res.statusText));
                }
            } catch (e) {
                showToast('Failed to start scan');
            } finally {
                if (btn) {
                    btn.disabled = false;
                    btn.textContent = 'Rescan Full Library';
                }
            }
        }

        async function scanFolder() {
            const input = document.getElementById('scanPathInput');
            const btn = document.getElementById('scanFolderBtn');
            if (!input || !btn) return;

            const folderPath = input.value.trim();
            if (!folderPath) {
                showToast('Enter a folder path first');
                return;
            }

            btn.disabled = true;
            btn.textContent = '…';
            try {
                const res = await fetch(`${API_BASE}/scan`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ path: folderPath }),
                });
                const data = await res.json();
                if (res.ok) {
                    showToast('Scan started: ' + folderPath.split('/').pop());
                    input.value = '';
                } else {
                    showToast('Error: ' + (data.error || res.statusText));
                }
            } catch (e) {
                showToast('Failed to start scan');
            } finally {
                if (btn) {
                    btn.disabled = false;
                    btn.textContent = 'Scan';
                }
            }
        }

        // Search
        document.getElementById('search').addEventListener('input', (e) => {
            const query = e.target.value.trim();
            clearTimeout(searchTimeout);

            if (query === '') {
                loadSearchContent();
                return;
            }

            searchTimeout = setTimeout(() => performSearch(query), 300);
        });

        async function performSearch(query) {
            const content = document.getElementById('content');
            content.innerHTML = '<div class="loading"><div class="spinner"></div><div>Searching...</div></div>';

            try {
                let url = `${API_BASE}/search?q=${encodeURIComponent(query)}&limit=100`;
                
                // Apply filter if not 'all'
                if (searchFilter === 'audio' || searchFilter === 'video') {
                    url += `&type=${searchFilter}`;
                } else if (searchFilter !== 'all') {
                    // Search within audio but filter by codec on client side
                    url += `&type=audio`;
                }
                
                const response = await fetch(url);
                const { data, pagination } = await response.json();

                // Apply client-side codec filtering if needed
                let filteredData = data;
                if (searchFilter === 'flac') {
                    filteredData = data.filter(item => (item.codec || '').toLowerCase().includes('flac'));
                } else if (searchFilter === 'dsf') {
                    filteredData = data.filter(item => (item.codec || '').toLowerCase().includes('dsf'));
                }

                if (filteredData.length === 0) {
                    content.innerHTML = '<div class="empty-state"><div class="icon">🔍</div><div>No results found</div></div>';
                    return;
                }

                currentPlaylist = filteredData; // Store tracks for queue

                let html = `
                    <div class="section-header">
                        <div class="section-title">Results</div>
                        <span class="see-all">${filteredData.length} found</span>
                    </div>
                `;

                filteredData.forEach(item => {
                    html += renderMediaItem(item);
                });

                content.innerHTML = html;
            } catch (error) {
                content.innerHTML = '<div class="empty-state"><div class="icon">⚠️</div><div>Search failed</div></div>';
            }
        }

        let searchFilter = 'all';

        function filterSearch(type, button) {
            document.querySelectorAll('.quick-action').forEach(b => b.classList.remove('active'));
            button.classList.add('active');
            searchFilter = type;
            
            // Re-run search if there's a query
            const query = document.getElementById('search').value.trim();
            if (query) {
                performSearch(query);
            }
        }

        // Render Media Item (Audio or Video)
        function renderMediaItem(item) {
            if (item.media_type === 'video') {
                return renderVideoItem(item);
            } else {
                return renderAudioItem(item);
            }
        }

        // Render Audio Item
        function renderAudioItem(track) {
            const codec = (track.codec || 'Unknown').toUpperCase();
            const isDSD = codec.includes('DSF') || codec.includes('DFF');
            const badgeClass = codec.includes('FLAC') ? 'badge-flac' : 
                               isDSD ? 'badge-dsf' : 'badge-hires';
            
            // Show DSD will be transcoded to FLAC (lossless)
            const codecDisplay = isDSD ? `${codec} → FLAC` : codec;
            
            const title = (track.title || track.file_name).replace(/"/g, '&quot;').replace(/'/g, '&#39;');
            const artist = (track.artist || 'Unknown Artist').replace(/"/g, '&quot;').replace(/'/g, '&#39;');
            const duration = track.duration ? formatTime(track.duration) : '';
            const sampleRate = track.sample_rate ? `${(track.sample_rate / 1000).toFixed(1)}kHz` : '';

            const isCurrentTrack = currentTrack && currentTrack.id === track.id && currentMediaType === 'audio';
            const playingClass = isCurrentTrack && isPlaying ? 'playing' : '';

            const thumbnailUrl = `${API_BASE}/thumbnail/${track.id}`;

            return `
                <div class="track-item" data-track-id="${track.id}" data-track-type="audio">
                    <div class="track-artwork ${playingClass}">
                        <img src="${thumbnailUrl}" alt="${title}" onerror="this.style.display='none'; this.nextElementSibling.style.display='block';" />
                        <span class="placeholder" style="display:none;">🎵</span>
                        ${isCurrentTrack && isPlaying ? '<span class="play-icon">▶</span>' : ''}
                    </div>
                    <div class="track-info">
                        <div class="track-title">${title}</div>
                        <div class="track-meta">
                            <span class="badge ${badgeClass}" title="${isDSD ? 'Losslessly transcoded to FLAC @ 96kHz for playback' : ''}">${codecDisplay}</span>
                            <span>${artist}${duration ? ' • ' + duration : ''}${sampleRate ? ' • ' + sampleRate : ''}</span>
                        </div>
                    </div>
                    <div class="track-more">⋮</div>
                </div>
            `;
        }

        // Render Video Item
        function renderVideoItem(video) {
            const title = video.file_name.replace(/\.[^/.]+$/, '').replace(/"/g, '&quot;').replace(/'/g, '&#39;');
            const duration = video.duration ? formatTime(video.duration) : '';
            const resolution = video.width && video.height ? `${video.width}x${video.height}` : '';
            const fps = video.frame_rate ? `${Math.round(video.frame_rate)}fps` : '';
            const codec = (video.codec || 'Unknown').toUpperCase();

            const thumbnailUrl = `${API_BASE}/thumbnail/${video.id}?width=240`;

            return `
                <div class="video-item" data-track-id="${video.id}" data-track-type="video">
                    <div class="video-thumbnail">
                        <img src="${thumbnailUrl}" alt="${title}" onerror="this.style.display='none'; this.nextElementSibling.style.display='block';" />
                        <span class="placeholder" style="display:none;">🎬</span>
                    </div>
                    <div class="track-info">
                        <div class="track-title">${title}</div>
                        <div class="track-meta">
                            <span class="badge badge-hires">${codec}</span>
                            <span>${resolution}${fps ? ' • ' + fps : ''}${duration ? ' • ' + duration : ''}</span>
                        </div>
                    </div>
                    <div class="track-more">⋮</div>
                </div>
            `;
        }

        // Play Audio
        function playAudio(track) {
            currentMediaType = 'audio';
            currentTrack = track;
            
            // Find the track index in current playlist
            currentTrackIndex = currentPlaylist.findIndex(t => t.id === track.id);
            
            // If track not in playlist, add it and make sure we can continue
            if (currentTrackIndex === -1 && currentPlaylist.length > 0) {
                // Track was clicked from a different context, keep current playlist
                currentTrackIndex = 0;
            } else if (currentPlaylist.length === 0) {
                // No playlist loaded yet, create one with just this track
                currentPlaylist = [track];
                currentTrackIndex = 0;
                bubbleAutoPlay = false;
            }
            
            audioPlayer.src = `${API_BASE}/stream/${track.id}`;

            const title = track.title || track.file_name;
            const artist = track.artist || 'Unknown Artist';
            const codec = (track.codec || 'Unknown').toUpperCase();
            const sampleRate = track.sample_rate ? `${(track.sample_rate / 1000).toFixed(1)}kHz` : '';
            const bitDepth = track.bits_per_sample ? `${track.bits_per_sample}-bit` : '';
            const thumbnailUrl = `${API_BASE}/thumbnail/${track.id}`;

            // Update mini player
            document.getElementById('miniTitle').textContent = title;
            document.getElementById('miniArtist').textContent = artist;
            document.getElementById('miniArtwork').innerHTML = `<img src="${thumbnailUrl}" alt="${title}" onerror="this.style.display='none'; this.nextElementSibling.style.display='block';" /><span class="placeholder" style="display:none;">🎵</span>`;
            document.getElementById('miniPlayer').classList.add('active');

            // Update full player
            document.getElementById('fullTitle').textContent = title;
            document.getElementById('fullArtist').textContent = artist;
            document.getElementById('fullCodec').textContent = codec;
            document.getElementById('fullQuality').textContent = `${sampleRate}${bitDepth ? ' • ' + bitDepth : ''}`;
            document.getElementById('fullArtwork').innerHTML = `<img src="${thumbnailUrl}" alt="${title}" onerror="this.style.display='none'; this.nextElementSibling.style.display='block';" onload="updatePlayerBackground(this)" crossorigin="anonymous" /><span class="placeholder" style="display:none;">🎵</span>`;

            // Show quality indicator
            const qualityIndicator = document.getElementById('qualityIndicator');
            if (qualityIndicator) {
                document.getElementById('qualityText').textContent = `${codec}${sampleRate ? ' • ' + sampleRate : ''}${bitDepth ? ' • ' + bitDepth : ''}`;
                qualityIndicator.classList.add('active');
                setTimeout(() => qualityIndicator.classList.remove('active'), 3000);
            }
            
            // Reset lyrics panel
            lyricsPanelExpanded = false;
            currentLyrics = null;
            const panel = document.getElementById('lyricsPanel');
            if (panel) {
                panel.classList.remove('expanded');
                document.getElementById('lyricsPanelContent').innerHTML = `
                    <div class="lyrics-loading">
                        <div>Tap to load lyrics...</div>
                    </div>
                `;
            }

            audioPlayer.play();
            isPlaying = true;
            updatePlayButtons();
            updateQueue();
            
            // Refresh the UI to show which track is playing
            refreshCurrentView();
        }

        // Player Controls
        function togglePlay() {
            if (isPlaying) {
                audioPlayer.pause();
                isPlaying = false;
            } else {
                audioPlayer.play();
                isPlaying = true;
            }
            updatePlayButtons();
        }

        function updatePlayButtons() {
            const icon = isPlaying ? '⏸' : '▶';
            document.getElementById('miniPlayBtn').textContent = icon;
            document.getElementById('fullPlayBtn').textContent = icon;
        }

        function nextTrack() {
            if (currentPlaylist.length === 0) {
                console.log('No playlist available');
                return;
            }
            
            // Move to next track in playlist
            currentTrackIndex++;
            
            // Handle repeat and end of playlist
            if (currentTrackIndex >= currentPlaylist.length) {
                if (repeatMode === 'all') {
                    currentTrackIndex = 0;
                } else if (bubbleAutoPlay) {
                    // Bubble playlist exhausted — keep playing random tracks from the library
                    playRandomFromLibrary();
                    return;
                } else {
                    // End of playlist, stop playing
                    isPlaying = false;
                    updatePlayButtons();
                    return;
                }
            }
            
            const trackToPlay = currentPlaylist[currentTrackIndex];
            console.log('Auto-playing next track:', trackToPlay.title || trackToPlay.file_name);
            
            if (currentMediaType === 'video') {
                playVideo(trackToPlay);
            } else {
                playAudio(trackToPlay);
            }
            
            const title = trackToPlay.title || trackToPlay.file_name.replace(/\.[^/.]+$/, '');
            showToast(`▶ ${title}`);
        }

        function previousTrack() {
            if (currentPlaylist.length === 0) return;
            
            // If more than 3 seconds into the media, restart it
            const player = currentMediaType === 'video' ? videoElement : audioPlayer;
            if (player.currentTime > 3) {
                player.currentTime = 0;
                return;
            }
            
            // Move to previous track
            currentTrackIndex--;
            
            // Loop to end if we're at the beginning
            if (currentTrackIndex < 0) {
                currentTrackIndex = currentPlaylist.length - 1;
            }
            
            const trackToPlay = currentPlaylist[currentTrackIndex];
            
            if (currentMediaType === 'video') {
                playVideo(trackToPlay);
            } else {
                playAudio(trackToPlay);
            }
            
            showToast(`⏮ ${trackToPlay.title || trackToPlay.file_name}`);
        }

        function refreshCurrentView() {
            // Re-render the current view to update playing indicators
            const content = document.getElementById('content');
            if (content.innerHTML.includes('track-item')) {
                let html = '';
                const sectionHeader = content.querySelector('.section-header');
                if (sectionHeader) {
                    html += sectionHeader.outerHTML;
                }
                currentPlaylist.forEach(track => {
                    html += renderMediaItem(track);
                });
                content.innerHTML = html;
            }
        }

        function skipForward() {
            audioPlayer.currentTime += 15;
        }

        function skipBackward() {
            audioPlayer.currentTime -= 15;
        }

        function seekTo(event) {
            const bar = event.currentTarget;
            const clickX = event.clientX - bar.getBoundingClientRect().left;
            const width = bar.offsetWidth;
            const percentage = clickX / width;
            audioPlayer.currentTime = audioPlayer.duration * percentage;
        }

        function updateProgress() {
            if (!audioPlayer.duration) return;
            const percentage = (audioPlayer.currentTime / audioPlayer.duration) * 100;
            progressFill.style.width = percentage + '%';
            currentTimeEl.textContent = formatTime(audioPlayer.currentTime);

            // Update mini player progress
            const miniProgressFill = document.getElementById('miniProgressFill');
            if (miniProgressFill) {
                miniProgressFill.style.width = percentage + '%';
            }
        }

        function formatTime(seconds) {
            if (!seconds || isNaN(seconds)) return '0:00';
            const mins = Math.floor(seconds / 60);
            const secs = Math.floor(seconds % 60);
            return `${mins}:${secs.toString().padStart(2, '0')}`;
        }

        // Full Player
        function openFullPlayer() {
            document.getElementById('fullPlayer').classList.add('active');
        }

        function closeFullPlayer() {
            document.getElementById('fullPlayer').classList.remove('active');
        }

        // Play Video
        function playVideo(video) {
            currentMediaType = 'video';
            currentTrack = video;
            
            // Find the video index in current playlist
            currentTrackIndex = currentPlaylist.findIndex(v => v.id === video.id);
            
            if (currentTrackIndex === -1 && currentPlaylist.length > 0) {
                currentTrackIndex = 0;
            } else if (currentPlaylist.length === 0) {
                currentPlaylist = [video];
                currentTrackIndex = 0;
            }
            
            const title = video.file_name.replace(/\.[^/.]+$/, '');
            const resolution = video.width && video.height ? `${video.width}x${video.height}` : '';
            const fps = video.frame_rate ? `${Math.round(video.frame_rate)}fps` : '';
            const codec = (video.codec || 'Unknown').toUpperCase();
            
            document.getElementById('videoTitle').textContent = title;
            document.getElementById('videoMeta').textContent = `${codec}${resolution ? ' • ' + resolution : ''}${fps ? ' • ' + fps : ''}`;
            
            videoElement.src = `${API_BASE}/stream/${video.id}`;
            document.getElementById('videoPlayer').classList.add('active');
            
            videoElement.play();
            isPlaying = true;
            updateQueue();
            
            // Auto-play next video when finished
            videoElement.onended = () => {
                handleTrackEnd();
            };
        }

        function closeVideoPlayer() {
            document.getElementById('videoPlayer').classList.remove('active');
            videoElement.pause();
            videoElement.src = '';
            isPlaying = false;
        }

        // Update Playback Bar Info
        function updatePlaybackBar() {
            const playlistInfo = document.getElementById('playlistInfo');
            if (playlistInfo) {
                const count = currentPlaylist.length;
                const shuffleStatus = isShuffled ? ' • Shuffled' : '';
                playlistInfo.textContent = count > 0 ? `${count} tracks${shuffleStatus}` : 'No playlist';
            }
        }

        // Play All
        function playAll() {
            if (currentPlaylist.length === 0) {
                showToast('No tracks to play');
                return;
            }
            
            // Play first track
            const firstTrack = currentPlaylist[0];
            if (currentMediaType === 'video') {
                playVideo(firstTrack);
            } else {
                playAudio(firstTrack);
            }
            
            showToast(`Playing ${currentPlaylist.length} tracks`);
        }

        // Toast Notification
        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.add('show');
            setTimeout(() => {
                toast.classList.remove('show');
            }, 2000);
        }

        // Infinite Scroll
        function setupInfiniteScroll() {
            window.addEventListener('scroll', () => {
                // Check if we're near the bottom of the page
                const scrollTop = window.pageYOffset || document.documentElement.scrollTop;
                const scrollHeight = document.documentElement.scrollHeight;
                const clientHeight = window.innerHeight;
                
                // Load more when scrolled to 80% of page (200px from bottom)
                if (scrollTop + clientHeight >= scrollHeight - 200) {
                    if (currentTab === 'music') {
                        loadLibraryContent(false);
                    } else if (currentTab === 'videos') {
                        loadVideosContent(false);
                    }
                }
            });
        }

        // Track Click Handlers (using event delegation)
        function setupTrackClickHandlers() {
            document.addEventListener('click', (e) => {
                // Find closest track-item or video-item
                const trackItem = e.target.closest('.track-item, .video-item');
                if (!trackItem) return;

                const trackId = parseInt(trackItem.dataset.trackId);
                const trackType = trackItem.dataset.trackType;
                
                if (!trackId || !trackType) return;

                // Find the track in currentPlaylist
                const track = currentPlaylist.find(t => t.id === trackId);
                if (!track) return;

                // Play the track
                if (trackType === 'audio') {
                    playAudio(track);
                } else if (trackType === 'video') {
                    playVideo(track);
                }
            });
        }

        // Swipe Gestures
        function setupSwipeGestures() {
            let touchStartX = 0;
            let touchStartY = 0;
            let touchEndX = 0;
            let touchEndY = 0;
            let isSwiping = false;

            const miniPlayer = document.getElementById('miniPlayer');
            const fullPlayer = document.getElementById('fullPlayer');
            const miniContent = miniPlayer.querySelector('.mini-player-content');

            // Swipe gestures on mini player
            miniPlayer.addEventListener('touchstart', (e) => {
                if (e.target.closest('.mini-controls')) return;
                touchStartX = e.touches[0].clientX;
                touchStartY = e.touches[0].clientY;
                isSwiping = true;
            }, { passive: true });

            miniPlayer.addEventListener('touchmove', (e) => {
                if (!isSwiping || e.target.closest('.mini-controls')) return;
                const currentX = e.touches[0].clientX;
                const deltaX = currentX - touchStartX;

                // Add visual feedback for horizontal swipe
                if (Math.abs(deltaX) > 10) {
                    miniContent.style.transform = `translateX(${deltaX * 0.3}px)`;
                    miniContent.style.transition = 'none';
                }
            }, { passive: true });

            miniPlayer.addEventListener('touchend', (e) => {
                if (!isSwiping || e.target.closest('.mini-controls')) {
                    isSwiping = false;
                    return;
                }

                touchEndX = e.changedTouches[0].clientX;
                touchEndY = e.changedTouches[0].clientY;

                const swipeDistanceX = touchEndX - touchStartX;
                const swipeDistanceY = touchStartY - touchEndY;

                // Reset transform with animation
                miniContent.style.transition = 'transform 0.3s cubic-bezier(0.4, 0, 0.2, 1)';
                miniContent.style.transform = 'translateX(0)';

                // Horizontal swipe (skip tracks)
                if (Math.abs(swipeDistanceX) > 60 && Math.abs(swipeDistanceX) > Math.abs(swipeDistanceY)) {
                    if (swipeDistanceX > 0) {
                        previousTrack(); // Swipe right = previous
                    } else {
                        nextTrack(); // Swipe left = next
                    }
                }
                // Vertical swipe (open full player)
                else if (swipeDistanceY > 50) {
                    openFullPlayer();
                }

                isSwiping = false;
            });

            // Swipe down on full player
            fullPlayer.addEventListener('touchstart', (e) => {
                if (e.target.closest('.control-btn, .progress-bar, .lyrics-panel')) return;
                touchStartY = e.touches[0].clientY;
            }, { passive: true });

            fullPlayer.addEventListener('touchend', (e) => {
                if (e.target.closest('.control-btn, .progress-bar, .lyrics-panel')) return;
                touchEndY = e.changedTouches[0].clientY;
                const swipeDistance = touchEndY - touchStartY;

                if (swipeDistance > 100) { // Swipe down
                    closeFullPlayer();
                }
            });
        }

        // Shuffle - loads and shuffles entire music library
        async function toggleShuffle() {
            isShuffled = !isShuffled;
            const btn = document.getElementById('shuffleBtn');
            const topBtn = document.getElementById('topShuffleBtn');

            if (isShuffled) {
                if (btn) btn.classList.add('active');
                if (topBtn) topBtn.classList.add('active');

                // Store original playlist for when shuffle is turned off
                originalPlaylist = [...currentPlaylist];

                showToast('🔀 Loading entire library...');

                try {
                    // Fetch ALL audio tracks from the library
                    const response = await fetch(`${API_BASE}/media?type=audio&limit=10000`);
                    const { data, pagination } = await response.json();

                    // Fisher-Yates shuffle the entire library
                    const shuffledLibrary = [...data];
                    for (let i = shuffledLibrary.length - 1; i > 0; i--) {
                        const j = Math.floor(Math.random() * (i + 1));
                        [shuffledLibrary[i], shuffledLibrary[j]] = [shuffledLibrary[j], shuffledLibrary[i]];
                    }

                    // If a track is currently playing, move it to the front
                    if (currentTrack) {
                        const currentIndex = shuffledLibrary.findIndex(t => t.id === currentTrack.id);
                        if (currentIndex > 0) {
                            shuffledLibrary.splice(currentIndex, 1);
                            shuffledLibrary.unshift(currentTrack);
                        }
                        currentTrackIndex = 0;
                    }

                    currentPlaylist = shuffledLibrary;
                    bubbleAutoPlay = false;
                    showToast(`🔀 Shuffled ${pagination.total} tracks`);
                } catch (error) {
                    console.error('Failed to load library for shuffle:', error);
                    // Fallback to shuffling current playlist
                    for (let i = currentPlaylist.length - 1; i > 0; i--) {
                        const j = Math.floor(Math.random() * (i + 1));
                        [currentPlaylist[i], currentPlaylist[j]] = [currentPlaylist[j], currentPlaylist[i]];
                    }
                    showToast('🔀 Shuffle on (current list)');
                }
            } else {
                if (btn) btn.classList.remove('active');
                if (topBtn) topBtn.classList.remove('active');
                currentPlaylist = [...originalPlaylist];

                // Find current track in original playlist
                if (currentTrack) {
                    currentTrackIndex = currentPlaylist.findIndex(t => t.id === currentTrack.id);
                }

                showToast('🔀 Shuffle off');
            }

            updateQueue();
            updatePlaybackBar();
        }

        // Repeat
        function toggleRepeat() {
            const btn = document.getElementById('repeatBtn');
            
            if (repeatMode === 'off') {
                repeatMode = 'all';
                btn.classList.add('active');
                btn.textContent = '🔁';
                showToast('🔁 Repeat all');
            } else if (repeatMode === 'all') {
                repeatMode = 'one';
                btn.textContent = '🔂';
                showToast('🔂 Repeat one');
            } else {
                repeatMode = 'off';
                btn.classList.remove('active');
                btn.textContent = '🔁';
                showToast('Repeat off');
            }
        }

        // Handle track end with repeat logic
        function handleTrackEnd() {
            if (repeatMode === 'one') {
                // Replay current track
                const player = currentMediaType === 'video' ? videoElement : audioPlayer;
                player.currentTime = 0;
                player.play();
            } else {
                nextTrack();
            }
        }

        // Queue Management
        function openQueue() {
            updateQueue();
            document.getElementById('queueView').classList.add('active');
        }

        function closeQueue() {
            document.getElementById('queueView').classList.remove('active');
        }

        function clearQueue() {
            if (confirm('Clear all upcoming tracks?')) {
                currentPlaylist = currentTrack ? [currentTrack] : [];
                currentTrackIndex = 0;
                updateQueue();
                showToast('Queue cleared');
            }
        }

        function updateQueue() {
            const nowPlaying = document.getElementById('queueNowPlaying');
            const upNext = document.getElementById('queueUpNext');
            
            if (currentTrack) {
                nowPlaying.innerHTML = renderQueueItem(currentTrack, true);
            } else {
                nowPlaying.innerHTML = '<div style="color: var(--text-subdued); padding: 12px;">Nothing playing</div>';
            }
            
            const upcoming = currentPlaylist.slice(currentTrackIndex + 1);
            if (upcoming.length > 0) {
                upNext.innerHTML = upcoming.map((track, idx) => renderQueueItem(track, false, idx)).join('');
            } else {
                upNext.innerHTML = '<div style="color: var(--text-subdued); padding: 12px;">Queue is empty</div>';
            }
        }

        function renderQueueItem(item, isCurrent, index) {
            const title = item.title || item.file_name.replace(/\.[^/.]+$/, '');
            const artist = item.artist || 'Unknown Artist';
            const duration = item.duration ? formatTime(item.duration) : '';
            
            return `
                <div class="queue-item ${isCurrent ? 'current' : ''}" ${!isCurrent ? `onclick="playFromQueue(${currentTrackIndex + 1 + index})"` : ''}>
                    <div class="track-artwork" style="width: 40px; height: 40px; font-size: 1em;">
                        ${isCurrent ? '▶' : '🎵'}
                    </div>
                    <div class="track-info" style="flex: 1;">
                        <div class="track-title" style="font-size: 0.95em;">${title}</div>
                        <div class="track-meta" style="font-size: 0.8em;">${artist}${duration ? ' • ' + duration : ''}</div>
                    </div>
                </div>
            `;
        }

        function playFromQueue(index) {
            if (index >= 0 && index < currentPlaylist.length) {
                currentTrackIndex = index;
                const track = currentPlaylist[index];
                
                if (currentMediaType === 'video') {
                    playVideo(track);
                } else {
                    playAudio(track);
                }
                
                closeQueue();
            }
        }

        // Lyrics (Karaoke) Management
        let currentLyrics = null;
        let lyricsSize = 'normal'; // small, normal, large
        let lyricsUpdateInterval = null;
        let lyricsPanelExpanded = false;

        function toggleLyricsPanel() {
            const panel = document.getElementById('lyricsPanel');
            lyricsPanelExpanded = !lyricsPanelExpanded;
            
            if (lyricsPanelExpanded) {
                panel.classList.add('expanded');
                // Load lyrics if not already loaded
                if (!currentLyrics && currentTrack) {
                    loadLyricsInPanel();
                }
            } else {
                panel.classList.remove('expanded');
            }
        }

        async function loadLyricsInPanel() {
            if (!currentTrack) {
                return;
            }

            const content = document.getElementById('lyricsPanelContent');
            content.innerHTML = `
                <div class="lyrics-loading">
                    <div class="spinner"></div>
                    <div>Loading lyrics...</div>
                </div>
            `;

            try {
                const response = await fetch(`${API_BASE}/lyrics/${currentTrack.id}`);
                const data = await response.json();

                if (!data.lyrics) {
                    content.innerHTML = `
                        <div class="no-lyrics">
                            <div class="icon">🎤</div>
                            <div>No lyrics available</div>
                        </div>
                    `;
                    currentLyrics = null;
                    return;
                }

                currentLyrics = data;

                if (data.synced && data.lines && data.lines.length > 0) {
                    // Time-synced lyrics
                    let html = '';
                    data.lines.forEach((line, index) => {
                        html += `<div class="lyrics-line" data-time="${line.time}" data-index="${index}">${line.text}</div>`;
                    });
                    content.innerHTML = html;
                    startLyricsSync();
                    if (data.source === 'online') {
                        showToast('🌐 Lyrics fetched');
                    }
                } else {
                    // Plain text
                    content.innerHTML = `<div class="lyrics-plain">${data.lyrics.replace(/\n/g, '<br>')}</div>`;
                    if (data.source === 'online') {
                        showToast('🌐 Lyrics fetched');
                    }
                }
            } catch (error) {
                console.error('Error loading lyrics:', error);
                content.innerHTML = `
                    <div class="no-lyrics">
                        <div class="icon">⚠️</div>
                        <div>Failed to load lyrics</div>
                    </div>
                `;
                currentLyrics = null;
            }
        }

        async function openLyrics() {
            if (!currentTrack) {
                showToast('No track playing');
                return;
            }

            const lyricsView = document.getElementById('lyricsView');
            const lyricsContent = document.getElementById('lyricsContent');
            const lyricsTitle = document.getElementById('lyricsTitle');
            const lyricsArtist = document.getElementById('lyricsArtist');
            
            // Show loading
            lyricsView.classList.add('active');
            lyricsContent.innerHTML = `
                <div class="lyrics-loading">
                    <div class="spinner"></div>
                    <div>Loading lyrics...</div>
                </div>
            `;

            // Set track info
            lyricsTitle.textContent = currentTrack.title || currentTrack.file_name;
            lyricsArtist.textContent = currentTrack.artist || 'Unknown Artist';

            try {
                const response = await fetch(`${API_BASE}/lyrics/${currentTrack.id}`);
                const data = await response.json();

                if (!data.lyrics) {
                    lyricsContent.innerHTML = `
                        <div class="no-lyrics">
                            <div class="icon">🎤</div>
                            <div>No lyrics available</div>
                            <p style="font-size: 0.9em; margin-top: 8px; color: var(--text-subdued);">
                                Could not find lyrics for this track
                            </p>
                        </div>
                    `;
                    currentLyrics = null;
                    return;
                }

                currentLyrics = data;

                // Show lyrics source badge
                const sourceBadge = data.source === 'online' ? 
                    '<div style="text-align: center; margin-bottom: 16px; font-size: 0.85em; color: var(--primary);">🌐 Fetched from LRCLIB</div>' : 
                    data.source === 'embedded' ? 
                    '<div style="text-align: center; margin-bottom: 16px; font-size: 0.85em; color: var(--text-subdued);">📝 Embedded lyrics</div>' : 
                    '';

                if (data.synced && data.lines && data.lines.length > 0) {
                    // Time-synced lyrics (LRC format) - Karaoke mode
                    lyricsContent.innerHTML = sourceBadge;
                    renderSyncedLyrics(data.lines);
                    startLyricsSync();
                    if (data.source === 'online') {
                        showToast('🌐 Lyrics fetched & cached');
                    }
                } else {
                    // Plain text lyrics
                    lyricsContent.innerHTML = sourceBadge + `<div class="lyrics-plain">${data.lyrics.replace(/\n/g, '<br>')}</div>`;
                    if (data.source === 'online') {
                        showToast('🌐 Lyrics fetched & cached');
                    }
                }
            } catch (error) {
                console.error('Error loading lyrics:', error);
                lyricsContent.innerHTML = `
                    <div class="no-lyrics">
                        <div class="icon">⚠️</div>
                        <div>Failed to load lyrics</div>
                    </div>
                `;
                currentLyrics = null;
            }
        }

        function renderSyncedLyrics(lines) {
            const lyricsContent = document.getElementById('lyricsContent');
            let html = '';
            
            lines.forEach((line, index) => {
                html += `<div class="lyrics-line" data-time="${line.time}" data-index="${index}">${line.text}</div>`;
            });
            
            // Append to existing content (keeps source badge)
            lyricsContent.insertAdjacentHTML('beforeend', html);
        }

        function startLyricsSync() {
            stopLyricsSync();
            
            lyricsUpdateInterval = setInterval(() => {
                if (!currentLyrics || !currentLyrics.synced) return;
                
                const currentTime = currentMediaType === 'video' ? videoElement.currentTime : audioPlayer.currentTime;
                const lines = currentLyrics.lines;
                
                // Find current line
                let currentLineIndex = -1;
                for (let i = lines.length - 1; i >= 0; i--) {
                    if (currentTime >= lines[i].time) {
                        currentLineIndex = i;
                        break;
                    }
                }

                // Update line states in both lyrics views
                const lineElements = document.querySelectorAll('.lyrics-line');
                lineElements.forEach((el, index) => {
                    el.classList.remove('active', 'past');
                    if (index === currentLineIndex) {
                        el.classList.add('active');
                        // Auto-scroll to current line
                        el.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    } else if (index < currentLineIndex) {
                        el.classList.add('past');
                    }
                });
            }, 100); // Update every 100ms
        }

        // Enhanced color extraction from album art
        function extractAlbumColors(img) {
            try {
                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');
                canvas.width = 100;
                canvas.height = 100;

                ctx.drawImage(img, 0, 0, 100, 100);
                const imageData = ctx.getImageData(0, 0, 100, 100).data;

                // Collect colors and their frequencies
                const colorBuckets = {};

                for (let i = 0; i < imageData.length; i += 4) {
                    const r = imageData[i];
                    const g = imageData[i + 1];
                    const b = imageData[i + 2];
                    const a = imageData[i + 3];

                    if (a < 128) continue; // Skip transparent pixels

                    // Convert to HSL for better color analysis
                    const hsl = rgbToHsl(r, g, b);

                    // Skip very dark, very light, and low saturation colors
                    if (hsl.l < 0.15 || hsl.l > 0.85 || hsl.s < 0.2) continue;

                    // Bucket by hue (36 buckets of 10 degrees each)
                    const hueBucket = Math.floor(hsl.h * 36);
                    const key = hueBucket;

                    if (!colorBuckets[key]) {
                        colorBuckets[key] = { r: 0, g: 0, b: 0, count: 0, saturation: 0 };
                    }
                    colorBuckets[key].r += r;
                    colorBuckets[key].g += g;
                    colorBuckets[key].b += b;
                    colorBuckets[key].saturation += hsl.s;
                    colorBuckets[key].count++;
                }

                // Find the most vibrant dominant color
                let bestBucket = null;
                let bestScore = 0;

                for (const key in colorBuckets) {
                    const bucket = colorBuckets[key];
                    // Score by count * saturation to prefer vibrant colors
                    const score = bucket.count * (bucket.saturation / bucket.count);
                    if (score > bestScore) {
                        bestScore = score;
                        bestBucket = bucket;
                    }
                }

                if (!bestBucket || bestBucket.count === 0) {
                    return { primary: '#1db954', dark: '#0a2818' };
                }

                const r = Math.floor(bestBucket.r / bestBucket.count);
                const g = Math.floor(bestBucket.g / bestBucket.count);
                const b = Math.floor(bestBucket.b / bestBucket.count);

                // Create vibrant primary color
                const primary = `rgb(${r}, ${g}, ${b})`;

                // Create dark version for gradient background
                const darkR = Math.floor(r * 0.3);
                const darkG = Math.floor(g * 0.3);
                const darkB = Math.floor(b * 0.3);
                const dark = `rgb(${darkR}, ${darkG}, ${darkB})`;

                return { primary, dark };
            } catch (e) {
                console.log('Color extraction error:', e);
                return { primary: '#1db954', dark: '#0a2818' };
            }
        }

        // Helper: RGB to HSL conversion
        function rgbToHsl(r, g, b) {
            r /= 255; g /= 255; b /= 255;
            const max = Math.max(r, g, b), min = Math.min(r, g, b);
            let h, s, l = (max + min) / 2;

            if (max === min) {
                h = s = 0;
            } else {
                const d = max - min;
                s = l > 0.5 ? d / (2 - max - min) : d / (max + min);
                switch (max) {
                    case r: h = ((g - b) / d + (g < b ? 6 : 0)) / 6; break;
                    case g: h = ((b - r) / d + 2) / 6; break;
                    case b: h = ((r - g) / d + 4) / 6; break;
                }
            }
            return { h, s, l };
        }

        function updatePlayerBackground(imgElement) {
            if (imgElement && imgElement.complete) {
                const colors = extractAlbumColors(imgElement);

                // Update CSS variables for dynamic theming
                document.documentElement.style.setProperty('--dynamic-color', colors.primary);
                document.documentElement.style.setProperty('--dynamic-color-dark', colors.dark);

                // Update full player background
                const bg = document.querySelector('.full-player-bg');
                if (bg) {
                    bg.style.background = `linear-gradient(180deg, ${colors.dark} 0%, #0a0a0a 50%, #000 100%)`;
                }
            }
        }

        function stopLyricsSync() {
            if (lyricsUpdateInterval) {
                clearInterval(lyricsUpdateInterval);
                lyricsUpdateInterval = null;
            }
        }

        function closeLyrics() {
            document.getElementById('lyricsView').classList.remove('active');
            stopLyricsSync();
        }

        function toggleLyricsSize() {
            const lyricsContent = document.getElementById('lyricsContent');
            lyricsContent.classList.remove('size-small', 'size-large');
            
            if (lyricsSize === 'normal') {
                lyricsSize = 'large';
                lyricsContent.classList.add('size-large');
                showToast('Large text');
            } else if (lyricsSize === 'large') {
                lyricsSize = 'small';
                lyricsContent.classList.add('size-small');
                showToast('Small text');
            } else {
                lyricsSize = 'normal';
                showToast('Normal text');
            }
        }
    </script>
