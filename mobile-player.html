<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Medis Mobile Player</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #000;
            color: #fff;
            overflow-x: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px;
            text-align: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        h1 {
            font-size: 1.5em;
            margin-bottom: 5px;
        }

        .subtitle {
            font-size: 0.9em;
            opacity: 0.9;
        }

        .tabs {
            display: flex;
            background: #1a1a1a;
            position: sticky;
            top: 80px;
            z-index: 99;
        }

        .tab {
            flex: 1;
            padding: 15px;
            text-align: center;
            background: transparent;
            border: none;
            color: #999;
            font-size: 1em;
            cursor: pointer;
            transition: all 0.3s;
        }

        .tab.active {
            color: #667eea;
            border-bottom: 3px solid #667eea;
        }

        .search {
            padding: 15px;
            background: #1a1a1a;
            position: sticky;
            top: 130px;
            z-index: 98;
        }

        input[type="text"] {
            width: 100%;
            padding: 12px;
            background: #2a2a2a;
            border: none;
            border-radius: 25px;
            color: #fff;
            font-size: 1em;
        }

        input[type="text"]::placeholder {
            color: #666;
        }

        .content {
            padding: 15px;
            padding-bottom: 150px;
        }

        .media-item {
            background: #1a1a1a;
            padding: 15px;
            margin-bottom: 10px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .media-icon {
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5em;
            flex-shrink: 0;
        }

        .media-info {
            flex: 1;
            min-width: 0;
        }

        .media-title {
            font-weight: bold;
            font-size: 1em;
            margin-bottom: 5px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .media-meta {
            font-size: 0.85em;
            color: #999;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 0.75em;
            margin-right: 5px;
        }

        .badge-flac { background: #28a745; }
        .badge-dsf { background: #ffc107; color: #000; }
        .badge-mp3 { background: #17a2b8; }

        .player-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: #1a1a1a;
            border-top: 1px solid #333;
            display: none;
        }

        .player-bar.active {
            display: block;
        }

        .player-info {
            padding: 15px;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .player-icon {
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5em;
        }

        .player-text {
            flex: 1;
            min-width: 0;
        }

        .player-title {
            font-weight: bold;
            font-size: 0.9em;
            margin-bottom: 3px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .player-artist {
            font-size: 0.8em;
            color: #999;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        audio {
            width: 100%;
            height: 50px;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #999;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-bottom: 20px;
        }

        .stat-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px;
            border-radius: 15px;
            text-align: center;
        }

        .stat-value {
            font-size: 2em;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .stat-label {
            font-size: 0.9em;
            opacity: 0.9;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🎵 Medis Player</h1>
        <p class="subtitle">Your personal audiophile library</p>
    </div>

    <div class="tabs">
        <button class="tab active" onclick="switchTab('audio', this)">🎵 Music</button>
        <button class="tab" onclick="switchTab('video', this)">🎬 Videos</button>
        <button class="tab" onclick="switchTab('stats', this)">📊 Stats</button>
    </div>

    <div class="search">
        <input type="text" id="search" placeholder="🔍 Search your library..." />
    </div>

    <div class="content" id="content">
        <div class="loading">Loading...</div>
    </div>

    <div class="player-bar" id="playerBar">
        <div class="player-info">
            <div class="player-icon">▶</div>
            <div class="player-text">
                <div class="player-title" id="playerTitle">-</div>
                <div class="player-artist" id="playerArtist">-</div>
            </div>
        </div>
        <audio id="audioPlayer" controls></audio>
    </div>

    <script>
        // Auto-detect server URL (works when served from the server)
        const SERVER_URL = window.location.origin;
        const API_BASE = `${SERVER_URL}/api`;

        let allMedia = [];
        let currentTab = 'audio';

        async function loadMedia(type, searchQuery = '') {
            try {
                let url = `${API_BASE}/media?type=${type}&limit=500`;
                if (searchQuery) {
                    url += `&search=${encodeURIComponent(searchQuery)}`;
                }
                const response = await fetch(url);
                const { data } = await response.json();
                allMedia = data;
                displayMedia(data);
            } catch (error) {
                document.getElementById('content').innerHTML = 
                    '<div class="loading">⚠️ Failed to load media<br><small>Check server connection</small></div>';
            }
        }

        function displayMedia(media) {
            if (media.length === 0) {
                document.getElementById('content').innerHTML = '<div class="loading">No media found</div>';
                return;
            }

            const icon = currentTab === 'audio' ? '🎵' : '🎬';
            const html = media.map(item => {
                const codec = (item.codec || 'Unknown').toUpperCase();
                const badgeClass = codec.includes('FLAC') ? 'badge-flac' : 
                                   codec.includes('DSF') ? 'badge-dsf' : 'badge-mp3';
                const title = item.title || item.file_name;
                const artist = item.artist || 'Unknown Artist';
                const duration = item.duration ? 
                    `${Math.floor(item.duration / 60)}:${String(Math.floor(item.duration % 60)).padStart(2, '0')}` : '';

                return `
                    <div class="media-item" onclick="playMedia(${item.id}, '${title.replace(/'/g, "\\'")}', '${artist.replace(/'/g, "\\'")}')">
                        <div class="media-icon">${icon}</div>
                        <div class="media-info">
                            <div class="media-title">${title}</div>
                            <div class="media-meta">
                                <span class="badge ${badgeClass}">${codec}</span>
                                ${artist} ${duration ? '• ' + duration : ''}
                            </div>
                        </div>
                    </div>
                `;
            }).join('');

            document.getElementById('content').innerHTML = html;
        }

        async function loadStats() {
            try {
                const response = await fetch(`${API_BASE}/stats`);
                const stats = await response.json();

                const html = `
                    <div class="stats-grid">
                        <div class="stat-card">
                            <div class="stat-value">${stats.audio_files}</div>
                            <div class="stat-label">Audio Files</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-value">${stats.video_files}</div>
                            <div class="stat-label">Video Files</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-value">${(stats.total_size_bytes / 1024 / 1024 / 1024).toFixed(1)} GB</div>
                            <div class="stat-label">Total Size</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-value">${(stats.total_duration_seconds / 3600).toFixed(0)} hrs</div>
                            <div class="stat-label">Duration</div>
                        </div>
                    </div>
                    <div style="text-align: center; color: #999; margin-top: 20px;">
                        <p>Last scan: ${new Date(stats.last_scan.completed_at * 1000).toLocaleString()}</p>
                        <p style="margin-top: 10px; font-size: 0.9em;">
                            Server: ${SERVER_URL}
                        </p>
                    </div>
                `;

                document.getElementById('content').innerHTML = html;
            } catch (error) {
                document.getElementById('content').innerHTML = 
                    '<div class="loading">⚠️ Failed to load stats</div>';
            }
        }

        function switchTab(type, button) {
            document.querySelectorAll('.tab').forEach(tab => tab.classList.remove('active'));
            button.classList.add('active');
            currentTab = type;
            document.getElementById('search').value = '';
            clearTimeout(searchTimeout);

            if (type === 'stats') {
                loadStats();
            } else {
                loadMedia(type);
            }
        }

        function playMedia(id, title, artist) {
            const playerBar = document.getElementById('playerBar');
            const audioPlayer = document.getElementById('audioPlayer');
            const playerTitle = document.getElementById('playerTitle');
            const playerArtist = document.getElementById('playerArtist');

            audioPlayer.src = `${API_BASE}/stream/${id}`;
            playerTitle.textContent = title;
            playerArtist.textContent = artist;

            playerBar.classList.add('active');
            audioPlayer.play();
        }

        let searchTimeout;
        document.getElementById('search').addEventListener('input', (e) => {
            const query = e.target.value.trim();
            
            // Clear previous timeout
            clearTimeout(searchTimeout);
            
            if (query === '') {
                loadMedia(currentTab);
                return;
            }

            // Debounce search - wait 300ms after user stops typing
            searchTimeout = setTimeout(() => {
                loadMedia(currentTab, query);
            }, 300);
        });

        // Initialize
        loadMedia('audio');
    </script>
</body>
</html>
